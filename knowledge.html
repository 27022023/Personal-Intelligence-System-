<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Knowledge Studio 📖</title>

<style>
body { margin:0; font-family:Georgia; background:#15100b; color:#f5e9c8; }

/* Title + back */
.top-bar {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:30px;
  margin-top:20px;
  z-index:9999;
  position:relative;
}
.back-arrow { font-size:50px; cursor:pointer; }
.title { text-align:center; font-size:70px; text-shadow:0 0 30px #f5e9c8; }

/* Bookshelves */
.library {
  position:fixed;
  top:140px;
  left:0;
  width:100%;
  height:calc(100% - 140px);
  background:radial-gradient(circle at top,#cfa96b 0%,#2b1f10 40%,#15100b 100%);
  z-index:1;
}
.shelf {
  width:90%; height:200px; background:#3b2a15; margin:30px auto; border-radius:12px;
  box-shadow:inset 0 0 25px rgba(0,0,0,0.8),0 12px 25px rgba(0,0,0,0.7);
  display:flex; align-items:flex-end; padding:22px 32px; gap:18px;
}
.book {
  width:52px; height:150px; border-radius:4px; border:2px solid rgba(0,0,0,0.6);
  box-shadow:inset 0 0 12px rgba(0,0,0,0.5);
}
.tall { height:170px; }
.short { height:120px; }
.red { background:#7b2e2e; }
.blue { background:#2e4a7b; }
.green { background:#2e7b4a; }
.yellow { background:#b89b3b; }
.purple { background:#5b2e7b; }

/* Desk */
.desk { width:100%; height:340px; background:#3f2b17; position:absolute; bottom:0; z-index:2; }

/* Buttons (Pastel Brown) */
.notes {
  position:absolute;
  bottom:40px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:40px;
  z-index:9999;
}
.note {
  width:280px; height:280px; background:#d8c3a5; border:3px solid #b89b7a;
  border-radius:16px; box-shadow:0 0 25px rgba(0,0,0,0.5);
  display:flex; justify-content:center; align-items:center;
  font-size:32px; font-weight:bold; cursor:pointer; color:#4a3b2b;
  transition:0.2s; text-align:center;
}
.note:hover { transform:scale(1.1); background:#e3d2bd; }

/* Sections */
.section {
  display:none;
  position:absolute;
  top:160px;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  max-height:60%;
  overflow-y:auto;
  background:white;
  color:#2b1f10;
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 30px black;
  font-size:24px;
  z-index:9999;
}
.close-btn { float:right; font-size:40px; cursor:pointer; }

/* Inputs (Lavender, bigger) */
input, textarea, select {
  width:100%;
  font-size:26px;
  padding:18px;
  margin:14px 0;
  border-radius:14px;
  border:2px solid #c9b2e8;
  background:#f7f2ff;
}

/* Buttons */
button {
  font-size:24px; padding:12px 20px; margin:10px 10px 10px 0;
  background:#d8c3a5; border:2px solid #b89b7a; border-radius:12px; color:#4a3b2b;
  cursor:pointer;
}
button:hover { background:#e3d2bd; }

/* Lavender Boxes (bigger) */
.item-row {
  background:#e6d6f5;
  border:2px solid #c9b2e8;
  padding:26px;
  margin:18px 0;
  border-radius:18px;
  font-size:24px;
}

/* NOTEBOOK BOOK */
.notebook {
  width:90%;
  max-width:900px;
  margin:40px auto;
  background:white;
  border-radius:12px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
  background-image: repeating-linear-gradient(
    to bottom,
    white 0px,
    white 28px,
    #e8e8e8 29px
  );
}
#note {
  width:100%;
  min-height:70vh;
  font-size:22px;
  line-height:29px;
  outline:none;
  border:none;
  background:transparent;
  color:#3b2f2f;
}

/* Highlighters */
.tools {
  display:flex;
  gap:15px;
  margin:20px auto;
  justify-content:center;
}
.hl-btn {
  padding:10px 20px;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}
.yellow { background:#f7d96f; }
.pink { background:#f7a6c7; }
.green { background:#9adf9a; }
.blue { background:#9ac7df; }
.clear { background:#b0a8a8; }

/* Page buttons */
.pages {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}
.page-btn {
  background:#d8c3a5;
  border:2px solid #b89b7a;
  color:#4a3b2b;
  padding:10px 15px;
  font-size:20px;
  border-radius:10px;
  cursor:pointer;
}
.page-btn:hover { background:#e3d2bd; }
.active { background:#b89b7a !important; color:white !important; }

/* Quiz answer buttons */
.quiz-answer {
  display:inline-block;
  margin:6px 8px 6px 0;
  padding:8px 14px;
  border-radius:10px;
  background:#f7f2ff;
  border:2px solid #c9b2e8;
  cursor:pointer;
}
.quiz-answer.correct { background:#9adf9a; }
.quiz-answer.wrong { background:#f7a6c7; }

/* Matching piles */
.match-container {
  display:flex;
  gap:40px;
  margin-top:20px;
}
.match-column {
  flex:1;
}
.match-item {
  padding:10px 14px;
  margin:6px 0;
  border-radius:10px;
  background:#f7f2ff;
  border:2px solid #c9b2e8;
  cursor:pointer;
}
.match-item.selected { background:#9ac7df; }
.match-item.matched { background:#9adf9a; }
</style>

<script>
function openSection(id){
  document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}
function closeSection(id){
  document.getElementById(id).style.display = 'none';
}
function goHome(){ window.location.href = "index.html"; }

/* QUIZ – automated, interactive, mixed */
let currentQuiz = { mcq: [], tf: [], matchA: [], matchB: [], pairs: [] };
let matchSelection = { a: null, b: null };

function generateQuiz(){
  const topic = document.getElementById("quizTopic").value.trim();
  const out = document.getElementById("quizList");
  const result = document.getElementById("quizResult");
  if(!topic){
    out.innerHTML = "";
    result.textContent = "Type a topic first.";
    return;
  }

  // Simple template-based generation (offline "AI")
  currentQuiz.mcq = [
    {
      q: `Which of the following best describes ${topic}?`,
      options: [
        `${topic} is a key concept you should understand.`,
        `${topic} is a random word.`,
        `${topic} has no meaning.`,
        `${topic} is only used in art.`
      ],
      correct: 0
    },
    {
      q: `Why is ${topic} important?`,
      options: [
        `It helps explain how things work.`,
        `It is never used in real life.`,
        `It only appears in games.`,
        `It is a secret code.`
      ],
      correct: 0
    }
  ];

  currentQuiz.tf = [
    {
      q: `${topic} can be learned step by step.`,
      correct: true
    },
    {
      q: `${topic} is impossible to understand.`,
      correct: false
    }
  ];

  currentQuiz.matchA = [
    `${topic} – definition`,
    `${topic} – example`,
    `${topic} – key idea`
  ];
  currentQuiz.matchB = [
    `Short explanation of what ${topic} means.`,
    `A simple situation where ${topic} appears.`,
    `The most important thing to remember about ${topic}.`
  ];
  currentQuiz.pairs = [0,1,2]; // A0→B0, A1→B1, A2→B2

  renderQuiz();
  result.textContent = "Quiz generated!";
}

function renderQuiz(){
  const out = document.getElementById("quizList");
  out.innerHTML = "";

  // Mixed exam style: MCQ + TF + Matching in one flow
  // MCQ
  currentQuiz.mcq.forEach((qObj, qi) => {
    let html = `<div class="item-row"><b>Q: ${qObj.q}</b><br>`;
    qObj.options.forEach((opt, oi) => {
      html += `<span class="quiz-answer" onclick="checkMCQ(${qi},${oi},this)">${opt}</span>`;
    });
    html += `</div>`;
    out.innerHTML += html;
  });

  // True/False
  currentQuiz.tf.forEach((qObj, qi) => {
    let html = `<div class="item-row"><b>Q: ${qObj.q}</b><br>`;
    html += `<span class="quiz-answer" onclick="checkTF(${qi},true,this)">True</span>`;
    html += `<span class="quiz-answer" onclick="checkTF(${qi},false,this)">False</span>`;
    html += `</div>`;
    out.innerHTML += html;
  });

  // Matching – click-to-pair
  let html = `<div class="item-row"><b>Match the items:</b>
  <div class="match-container">
    <div class="match-column"><b>Pile A</b>`;
  currentQuiz.matchA.forEach((item, i) => {
    html += `<div class="match-item" onclick="selectMatch('a',${i},this)" data-index="${i}">${item}</div>`;
  });
  html += `</div><div class="match-column"><b>Pile B</b>`;
  currentQuiz.matchB.forEach((item, i) => {
    html += `<div class="match-item" onclick="selectMatch('b',${i},this)" data-index="${i}">${item}</div>`;
  });
  html += `</div></div></div>`;
  out.innerHTML += html;

  matchSelection = { a: null, b: null };
}

function checkMCQ(qIndex, optIndex, el){
  const q = currentQuiz.mcq[qIndex];
  const correct = (optIndex === q.correct);
  const parent = el.parentElement;
  parent.querySelectorAll('.quiz-answer').forEach(a => {
    a.classList.remove('correct','wrong');
  });
  el.classList.add(correct ? 'correct' : 'wrong');
}

function checkTF(qIndex, answer, el){
  const q = currentQuiz.tf[qIndex];
  const correct = (answer === q.correct);
  const parent = el.parentElement;
  parent.querySelectorAll('.quiz-answer').forEach(a => {
    a.classList.remove('correct','wrong');
  });
  el.classList.add(correct ? 'correct' : 'wrong');
}

function selectMatch(side, index, el){
  // If already matched, ignore
  if(el.classList.contains('matched')) return;

  // Clear previous selection on that side
  const container = el.parentElement;
  container.querySelectorAll('.match-item').forEach(i => i.classList.remove('selected'));

  el.classList.add('selected');
  matchSelection[side] = { index, el };

  if(matchSelection.a && matchSelection.b){
    const aIndex = matchSelection.a.index;
    const bIndex = matchSelection.b.index;
    const correctPairIndex = currentQuiz.pairs[aIndex]; // expected B index

    if(bIndex === correctPairIndex){
      matchSelection.a.el.classList.remove('selected');
      matchSelection.b.el.classList.remove('selected');
      matchSelection.a.el.classList.add('matched');
      matchSelection.b.el.classList.add('matched');
    } else {
      matchSelection.a.el.classList.add('wrong');
      matchSelection.b.el.classList.add('wrong');
      setTimeout(() => {
        matchSelection.a.el.classList.remove('selected','wrong');
        matchSelection.b.el.classList.remove('selected','wrong');
      }, 600);
    }
    matchSelection = { a:null, b:null };
  }
}

/* FLASHCARDS */
let cards=[];
function addCard(){
  const f=document.getElementById("flashF").value;
  const b=document.getElementById("flashB").value;
  if(!f.trim()||!b.trim())return;
  cards.push({f,b});
  renderCards();
}
function renderCards(){
  const flashList=document.getElementById("flashList");
  flashList.innerHTML="";
  cards.forEach((x,i)=>{
    flashList.innerHTML+=`<div class='item-row' onclick='flip(${i})' id='c${i}' data='f'><b>${x.f}</b></div>`;
  });
}
function flip(i){
  let el=document.getElementById("c"+i),x=cards[i];
  if(el.dataset.data=="f"){el.innerHTML="<b>"+x.b+"</b>";el.dataset.data="b";}
  else{el.innerHTML="<b>"+x.f+"</b>";el.dataset.data="f";}
}
function saveFlashcards(){
  localStorage.setItem("ks_flashcards",JSON.stringify(cards));
}
function deleteFlashcards(){
  if(!confirm("Delete all flashcards?"))return;
  cards=[];
  localStorage.removeItem("ks_flashcards");
  renderCards();
}
function loadFlashcards(){
  const raw=localStorage.getItem("ks_flashcards");
  cards=raw?JSON.parse(raw):[];
  renderCards();
}

/* TEACHER – text-based helper */
function teacherExplain(){
  const question = document.getElementById("teacherQuestion").value.trim();
  const out = document.getElementById("teacherOut");
  if(!question){
    out.textContent = "Type what you want explained.";
    return;
  }

  // Simple structured explanation (offline "AI")
  out.textContent =
    "Here’s a simple way to think about:\n\n" +
    "• Topic: " + question + "\n\n" +
    "1. What it is:\n" +
    "   Imagine " + question + " as a concept that helps you understand how something works.\n\n" +
    "2. Why it matters:\n" +
    "   It shows up when you try to solve problems, answer questions, or understand examples.\n\n" +
    "3. Easy example:\n" +
    "   Think of a situation in your life where " + question +
    " appears. Describe what happens and how " + question + " changes things.\n\n" +
    "4. How to remember it:\n" +
    "   Turn it into a short sentence in your own words. If you can explain it simply, you understand it.\n\n" +
    "If you want, try writing your own example under this explanation.";
}
function saveTeacher(){
  localStorage.setItem("ks_teacher",document.getElementById("teacherOut").textContent);
}
function deleteTeacher(){
  if(!confirm("Delete explanation?"))return;
  localStorage.removeItem("ks_teacher");
  document.getElementById("teacherOut").textContent="";
}
function loadTeacher(){
  const saved=localStorage.getItem("ks_teacher");
  if(saved)document.getElementById("teacherOut").textContent=saved;
}

/* NOTEBOOK BOOK */
let pages=[];
let currentPage=0;

function loadNotebook(){
  const saved=localStorage.getItem("KS_Notebook_Pages");
  pages=saved?JSON.parse(saved):[""];
  renderPages();
  loadPage(0);
}
function savePages(){
  localStorage.setItem("KS_Notebook_Pages",JSON.stringify(pages));
}
function loadPage(i){
  currentPage=i;
  document.getElementById("note").innerHTML=pages[i];
  updateActiveButton();
}
function saveCurrentPage(){
  pages[currentPage]=document.getElementById("note").innerHTML;
  savePages();
}
function addPage(){
  pages.push("");
  savePages();
  renderPages();
  loadPage(pages.length-1);
}
function renderPages(){
  const container=document.getElementById("pageButtons");
  container.innerHTML="";
  pages.forEach((_,i)=>{
    container.innerHTML+=`<button class="page-btn" onclick="loadPage(${i})">Page ${i+1}</button>`;
  });
}
function highlight(color){
  let sel=window.getSelection();
  if(!sel.rangeCount)return;
  let range=sel.getRangeAt(0);
  let span=document.createElement("span");
  span.style.backgroundColor=(color==="clear")?"transparent":color;
  range.surroundContents(span);
  saveCurrentPage();
}
function updateActiveButton(){
  const buttons=document.querySelectorAll(".page-btn");
  buttons.forEach((btn,i)=>{
    btn.classList.toggle("active",i===currentPage);
  });
}

/* INIT */
window.onload=function(){
  loadFlashcards();
  loadTeacher();
  loadNotebook();
};
</script>
</head>

<body>

<div class="top-bar">
  <div class="back-arrow" onclick="goHome()">←</div>
  <div class="title">Knowledge Studio</div>
</div>

<div class="library">
<script>
const colors=["red","blue","green","yellow","purple"];
for(let s=0;s<4;s++){
  document.write('<div class="shelf">');
  for(let b=0;b<14;b++){
    let c=colors[Math.floor(Math.random()*colors.length)];
    let h=[""," tall"," short"][Math.floor(Math.random()*3)];
    document.write(`<div class="book ${c}${h}"></div>`);
  }
  document.write('</div>');
}
</script>
</div>

<div class="desk"></div>

<div class="notes">
  <div class="note" onclick="openSection('quizSection')">Quiz</div>
  <div class="note" onclick="openSection('flashSection')">Flashcards</div>
  <div class="note" onclick="openSection('teacherSection')">Teacher</div>
  <div class="note" onclick="openSection('notebookSection')">Notebook</div>
</div>

<!-- QUIZ -->
<div class="section" id="quizSection">
  <div class="close-btn" onclick="closeSection('quizSection')">✖</div>
  <h2>Automated Interactive Quiz</h2>
  <input id="quizTopic" placeholder="Type a topic (e.g. photosynthesis, fractions, World War II)">
  <button onclick="generateQuiz()">Generate Quiz</button>
  <div id="quizList"></div>
  <div id="quizResult" style="margin-top:10px;"></div>
</div>

<!-- FLASHCARDS -->
<div class="section" id="flashSection">
  <div class="close-btn" onclick="closeSection('flashSection')">✖</div>
  <h2>Flashcards</h2>
  <input id="flashF" placeholder="Front">
  <input id="flashB" placeholder="Back">
  <button onclick="addCard()">Add</button>
  <button onclick="saveFlashcards()">Save</button>
  <button onclick="deleteFlashcards()">Delete</button>
  <div id="flashList"></div>
</div>

<!-- TEACHER -->
<div class="section" id="teacherSection">
  <div class="close-btn" onclick="closeSection('teacherSection')">✖</div>
  <h2>Teacher Helper</h2>
  <input id="teacherQuestion" placeholder="What do you want explained?">
  <button onclick="teacherExplain()">Explain</button>
  <button onclick="saveTeacher()">Save Explanation</button>
  <button onclick="deleteTeacher()">Delete Explanation</button>
  <p id="teacherOut" style="white-space:pre-wrap; margin-top:20px;"></p>
</div>

<!-- NOTEBOOK BOOK -->
<div class="section" id="notebookSection">
  <div class="close-btn" onclick="closeSection('notebookSection')">✖</div>
  <h2>Notebook Book 📖</h2>

  <div class="tools">
    <button class="hl-btn yellow" onclick="highlight('#f7d96f')">Yellow</button>
    <button class="hl-btn pink" onclick="highlight('#f7a6c7')">Pink</button>
    <button class="hl-btn green" onclick="highlight('#9adf9a')">Green</button>
    <button class="hl-btn blue" onclick="highlight('#9ac7df')">Blue</button>
    <button class="hl-btn clear" onclick="highlight('clear')">Clear</button>
  </div>

  <div class="pages" id="pageButtons"></div>

  <div class="notebook">
    <div id="note" contenteditable="true" oninput="saveCurrentPage()"></div>
  </div>

  <div style="text-align:center; margin-bottom:40px;">
    <button class="page-btn" onclick="addPage()">➕ Add Page</button>
  </div>
</div>

</body>
</html>
