<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Knowledge Studio</title>

<style>
body { margin:0; font-family:Georgia; background:#15100b; color:#f5e9c8; }

/* Title + back */
.top-bar {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}
.back-arrow {
  font-size:50px;
  cursor:pointer;
}
.title {
  text-align:center;
  font-size:70px;
  text-shadow:0 0 30px #f5e9c8;
}

/* Bookshelves */
.library {
  position:fixed; top:140px; left:0; width:100%; height:calc(100% - 140px);
  background:radial-gradient(circle at top,#cfa96b 0%,#2b1f10 40%,#15100b 100%);
  z-index:-1;
}
.shelf {
  width:90%; height:200px; background:#3b2a15; margin:30px auto; border-radius:12px;
  box-shadow:inset 0 0 25px rgba(0,0,0,0.8),0 12px 25px rgba(0,0,0,0.7);
  display:flex; align-items:flex-end; padding:22px 32px; gap:18px;
}
.book {
  width:52px; height:150px; border-radius:4px; border:2px solid rgba(0,0,0,0.6);
  box-shadow:inset 0 0 12px rgba(0,0,0,0.5);
}
.tall { height:170px; }
.short { height:120px; }
.red { background:#7b2e2e; }
.blue { background:#2e4a7b; }
.green { background:#2e7b4a; }
.yellow { background:#b89b3b; }
.purple { background:#5b2e7b; }

/* Desk */
.desk { width:100%; height:340px; background:#3f2b17; position:absolute; bottom:0; }

/* Buttons (Pastel Brown) */
.notes {
  position:absolute; bottom:40px; width:100%; display:flex; justify-content:center; gap:40px;
}
.note {
  width:280px; height:280px; background:#d8c3a5; border:3px solid #b89b7a;
  border-radius:16px; box-shadow:0 0 25px rgba(0,0,0,0.5);
  display:flex; justify-content:center; align-items:center;
  font-size:32px; font-weight:bold; cursor:pointer; color:#4a3b2b;
  transition:0.2s; text-align:center;
}
.note:hover { transform:scale(1.1); background:#e3d2bd; }

/* Sections */
.section {
  display:none; position:absolute; top:160px; left:50%; transform:translateX(-50%);
  width:85%; max-height:60%; overflow-y:auto;
  background:white; color:#2b1f10; padding:30px; border-radius:20px;
  box-shadow:0 0 30px black; font-size:24px;
}
.close-btn { float:right; font-size:40px; cursor:pointer; }

/* Inputs (Lavender) */
input, textarea, select {
  width:100%; font-size:24px; padding:14px; margin:10px 0;
  border-radius:12px; border:2px solid #c9b2e8; background:#f7f2ff;
}

/* Buttons */
button {
  font-size:24px; padding:12px 20px; margin:10px 10px 10px 0;
  background:#d8c3a5; border:2px solid #b89b7a; border-radius:12px; color:#4a3b2b;
  cursor:pointer;
}
button:hover { background:#e3d2bd; }

/* Lavender Boxes */
.item-row {
  background:#e6d6f5; border:2px solid #c9b2e8;
  padding:20px; margin:15px 0; border-radius:16px; font-size:22px;
}

/* Note Paper */
.note-paper {
  border:3px solid #c9b2e8; border-radius:16px;
  padding:20px; min-height:300px; background:#fffdf7;
}
#photosGallery img {
  max-width:120px;
  max-height:120px;
  margin:8px;
  border-radius:10px;
  border:2px solid #c9b2e8;
}
</style>

<script>
const SERVER_URL = "http://localhost:8000";

const LS_KEYS = {
  quizzes: "ks_quizzes",
  flashcards: "ks_flashcards",
  notes: "ks_notes",
  teacher: "ks_teacher_explanation"
};

/* Section + home */
function openSection(id){document.getElementById(id).style.display="block";}
function closeSection(id){document.getElementById(id).style.display="none";}
function goHome(){window.location.href="index.html";}

/* QUIZ */
let quizzes=[];
function addQuiz(){
  const q = document.getElementById("quizQ").value;
  const c = document.getElementById("quizC").value;
  if(!q.trim() || !c.trim()) return;
  quizzes.push({q,c});
  renderQuiz();
}
function renderQuiz(){
  const quizList = document.getElementById("quizList");
  quizList.innerHTML="";
  quizzes.forEach((x,i)=>{
    quizList.innerHTML+=
    `<div class='item-row'><b>${x.q}</b><br>
     <input placeholder='Your answer' onblur='check(${i},this.value)'></div>`;
  });
}
function check(i,a){
  const quizResult = document.getElementById("quizResult");
  quizResult.textContent = (a.trim()==quizzes[i].c.trim()) ? "Correct!" : "Wrong";
}
async function aiQuiz(){
  const quizResult = document.getElementById("quizResult");
  const quizTopic = document.getElementById("quizTopic").value;
  quizResult.textContent="AI thinking...";
  try{
    let r=await fetch(SERVER_URL+"/solve-text",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({mode:"quiz",content:quizTopic})});
    let data=await r.json();
    JSON.parse(data.result).forEach(q=>quizzes.push({q:q.question,c:q.correct}));
    renderQuiz(); quizResult.textContent="AI quiz added!";
  }catch{quizResult.textContent="AI error";}
}
function saveQuizzes(){
  localStorage.setItem(LS_KEYS.quizzes, JSON.stringify(quizzes));
  document.getElementById("quizResult").textContent="Quizzes saved.";
}
function deleteQuizzes(){
  if(!confirm("Delete all quizzes?")) return;
  quizzes=[];
  localStorage.removeItem(LS_KEYS.quizzes);
  renderQuiz();
  document.getElementById("quizResult").textContent="Quizzes deleted.";
}
function loadQuizzes(){
  const raw = localStorage.getItem(LS_KEYS.quizzes);
  quizzes = raw ? JSON.parse(raw) : [];
  renderQuiz();
}

/* FLASHCARDS */
let cards=[];
function addCard(){
  const f = document.getElementById("flashF").value;
  const b = document.getElementById("flashB").value;
  if(!f.trim() || !b.trim()) return;
  cards.push({f,b});
  renderCards();
}
function renderCards(){
  const flashList = document.getElementById("flashList");
  flashList.innerHTML="";
  cards.forEach((x,i)=>{
    flashList.innerHTML+=
    `<div class='item-row' onclick='flip(${i})' id='c${i}' data='f'><b>${x.f}</b></div>`;
  });
}
function flip(i){
  let el=document.getElementById("c"+i),x=cards[i];
  if(el.dataset.data=="f"){el.innerHTML="<b>"+x.b+"</b>"; el.dataset.data="b";}
  else{el.innerHTML="<b>"+x.f+"</b>"; el.dataset.data="f";}
}
async function aiCards(){
  const flashF = document.getElementById("flashF").value;
  try{
    let r=await fetch(SERVER_URL+"/solve-text",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({mode:"flashcards",content:flashF})});
    let data=await r.json();
    JSON.parse(data.result).forEach(c=>cards.push({f:c.front,b:c.back}));
    renderCards();
  }catch{alert("AI error");}
}
function saveFlashcards(){
  localStorage.setItem(LS_KEYS.flashcards, JSON.stringify(cards));
  alert("Flashcards saved.");
}
function deleteFlashcards(){
  if(!confirm("Delete all flashcards?")) return;
  cards=[];
  localStorage.removeItem(LS_KEYS.flashcards);
  renderCards();
}
function loadFlashcards(){
  const raw = localStorage.getItem(LS_KEYS.flashcards);
  cards = raw ? JSON.parse(raw) : [];
  renderCards();
}

/* TEACHER */
async function teacherExplain(){
  const fileInput = document.getElementById("teacherFile");
  const teacherOut = document.getElementById("teacherOut");
  let file=fileInput.files[0];
  if(!file){ teacherOut.textContent="Upload something first."; return; }
  teacherOut.textContent="Thinking...";
  try{
    let fd=new FormData(); fd.append("image",file);
    let r=await fetch(SERVER_URL+"/solve-image",{method:"POST",body:fd});
    let data=await r.json();
    teacherOut.textContent=data.result;
  }catch{
    teacherOut.textContent="AI error.";
  }
}
function saveTeacher(){
  const teacherOut = document.getElementById("teacherOut").textContent;
  localStorage.setItem(LS_KEYS.teacher, teacherOut);
  alert("Explanation saved.");
}
function deleteTeacher(){
  if(!confirm("Delete saved explanation?")) return;
  localStorage.removeItem(LS_KEYS.teacher);
  document.getElementById("teacherOut").textContent="";
}
function loadTeacher(){
  const saved = localStorage.getItem(LS_KEYS.teacher);
  if(saved) document.getElementById("teacherOut").textContent = saved;
}

/* NOTES */
let notes=[],cur=null;

function newNote(){
  cur = notes.length;
  notes.push({title:"Untitled note", c:"", photos:[]});
  renderNotes();
  loadNote();
}
function loadNote(){
  const titleInput = document.getElementById("noteTitle");
  const textArea = document.getElementById("noteText");
  const gallery = document.getElementById("photosGallery");

  if(cur===null || !notes[cur]) {
    titleInput.value="";
    textArea.value="";
    gallery.innerHTML="";
    return;
  }
  titleInput.value = notes[cur].title || "";
  textArea.value = notes[cur].c || "";
  renderPhotos();
}
function saveNote(){
  if(cur===null || !notes[cur]) return;
  notes[cur].title = document.getElementById("noteTitle").value;
  notes[cur].c = document.getElementById("noteText").value;
  localStorage.setItem(LS_KEYS.notes, JSON.stringify(notes));
  renderNotes();
}
function renderNotes(){
  const notesList = document.getElementById("notesList");
  notesList.innerHTML="";
  notes.forEach((x,i)=>{
    const displayTitle = x.title && x.title.trim() ? x.title : `Note ${i+1}`;
    notesList.innerHTML+=
      `<div class='item-row'>
        <b>${displayTitle}</b> 
        <button onclick='openNote(${i})'>Open</button>
        <button onclick='deleteNote(${i})'>Delete</button>
      </div>`;
  });
}
function openNote(i){
  cur = i;
  loadNote();
  openSection('notesSection');
}
function deleteNote(i){
  if(!confirm("Delete this note?")) return;
  notes.splice(i,1);
  if(notes.length===0) cur=null;
  else if(cur>=notes.length) cur = notes.length-1;
  localStorage.setItem(LS_KEYS.notes, JSON.stringify(notes));
  renderNotes();
  loadNote();
}
function handlePhotoUpload(){
  if(cur===null || !notes[cur]) {
    alert("Create or open a note first.");
    return;
  }
  const fileInput = document.getElementById("notePhoto");
  const file = fileInput.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    notes[cur].photos.push(e.target.result);
    localStorage.setItem(LS_KEYS.notes, JSON.stringify(notes));
    renderPhotos();
  };
  reader.readAsDataURL(file);
}
function renderPhotos(){
  const gallery = document.getElementById("photosGallery");
  gallery.innerHTML="";
  if(cur===null || !notes[cur] || !notes[cur].photos) return;
  notes[cur].photos.forEach(src=>{
    const img = document.createElement("img");
    img.src = src;
    gallery.appendChild(img);
  });
}
function saveNotesAll(){
  localStorage.setItem(LS_KEYS.notes, JSON.stringify(notes));
  alert("All notes saved.");
}
function deleteNotesAll(){
  if(!confirm("Delete ALL notes?")) return;
  notes=[];
  cur=null;
  localStorage.removeItem(LS_KEYS.notes);
  renderNotes();
  loadNote();
}
function loadNotes(){
  const raw = localStorage.getItem(LS_KEYS.notes);
  notes = raw ? JSON.parse(raw) : [];
  if(notes.length>0) cur=0;
  renderNotes();
  loadNote();
}

/* INIT */
window.onload = function(){
  loadQuizzes();
  loadFlashcards();
  loadNotes();
  loadTeacher();
};
</script>
</head>

<body>

<div class="top-bar">
  <div class="back-arrow" onclick="goHome()">←</div>
  <div class="title">Knowledge Studio</div>
</div>

<div class="library">
<script>
const colors=["red","blue","green","yellow","purple"];
for(let s=0;s<4;s++){
  document.write('<div class="shelf">');
  for(let b=0;b<14;b++){
    let c=colors[Math.floor(Math.random()*colors.length)];
    let h=[""," tall"," short"][Math.floor(Math.random()*3)];
    document.write(`<div class="book ${c}${h}"></div>`);
  }
  document.write('</div>');
}
</script>
</div>

<div class="desk"></div>

<div class="notes">
  <div class="note" onclick="openSection('quizSection')">Quiz</div>
  <div class="note" onclick="openSection('flashSection')">Flashcards</div>
  <div class="note" onclick="openSection('teacherSection')">Teacher</div>
  <div class="note" onclick="openSection('notesSection')">Notes</div>
</div>

<!-- QUIZ -->
<div class="section" id="quizSection">
  <div class="close-btn" onclick="closeSection('quizSection')">✖</div>
  <h2>Quiz Generator</h2>
  <input id="quizTopic" placeholder="AI Topic">
  <button onclick="aiQuiz()">AI Generate</button>
  <hr>
  <input id="quizQ" placeholder="Question">
  <input id="quizC" placeholder="Correct Answer">
  <button onclick="addQuiz()">Add</button>
  <button onclick="saveQuizzes()">Save Quizzes</button>
  <button onclick="deleteQuizzes()">Delete Quizzes</button>
  <div id="quizList"></div>
  <div id="quizResult"></div>
</div>

<!-- FLASHCARDS -->
<div class="section" id="flashSection">
  <div class="close-btn" onclick="closeSection('flashSection')">✖</div>
  <h2>Flashcards</h2>
  <input id="flashF" placeholder="Front / AI Topic">
  <input id="flashB" placeholder="Back">
  <button onclick="addCard()">Add</button>
  <button onclick="aiCards()">AI Generate</button>
  <button onclick="saveFlashcards()">Save Flashcards</button>
  <button onclick="deleteFlashcards()">Delete Flashcards</button>
  <div id="flashList"></div>
</div>

<!-- TEACHER -->
<div class="section" id="teacherSection">
  <div class="close-btn" onclick="closeSection('teacherSection')">✖</div>
  <h2>Virtual Teacher</h2>
  <input type="file" id="teacherFile">
  <button onclick="teacherExplain()">Explain</button>
  <button onclick="saveTeacher()">Save Explanation</button>
  <button onclick="deleteTeacher()">Delete Explanation</button>
  <p id="teacherOut" style="white-space:pre-wrap;"></p>
</div>

<!-- NOTES -->
<div class="section" id="notesSection">
  <div class="close-btn" onclick="closeSection('notesSection')">✖</div>
  <h2>Notes</h2>
  <button onclick="newNote()">New Note</button>
  <button onclick="saveNotesAll()">Save All Notes</button>
  <button onclick="deleteNotesAll()">Delete All Notes</button>
  <div id="notesList"></div>
  <div class="note-paper">
    <input id="noteTitle" placeholder="Note title..." oninput="saveNote()">
    <textarea id="noteText" oninput="saveNote()" style="width:100%;height:250px;"></textarea>
    <hr>
    <label>Photos for this note (gallery at bottom):</label>
    <input type="file" id="notePhoto" accept="image/*">
    <button onclick="handlePhotoUpload()">Add Photo</button>
    <div id="photosGallery"></div>
  </div>
</div>

</body>
</html>
