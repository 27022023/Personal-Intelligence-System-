<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knowledge Studio 📖</title>

<style>
body {
    margin: 0;
    font-family: "Georgia", serif;
    background: #15100b;
    color: #f5e9c8;
    overflow-x: hidden;
}
.title {
    text-align: center;
    margin-top: 20px;
    font-size: 80px;
    font-family: "Lucida Calligraphy", cursive;
    color: #f5e9c8;
    text-shadow: 0 0 30px #f5e9c8;
}
.back {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 60px;
    color: #f5e9c8;
    cursor: pointer;
    text-shadow: 0 0 15px #f5e9c8;
}
.back:hover { transform: scale(1.2); }
.library {
    position: fixed;
    top: 140px;
    left: 0;
    width: 100%;
    height: calc(100% - 140px);
    background: radial-gradient(circle at top, #cfa96b 0%, #2b1f10 40%, #15100b 100%);
    z-index: -1;
}
.shelf {
    width: 90%;
    height: 200px;
    background: #3b2a15;
    margin: 30px auto;
    border-radius: 12px;
    box-shadow: inset 0 0 25px rgba(0,0,0,0.8), 0 12px 25px rgba(0,0,0,0.7);
    display: flex;
    align-items: flex-end;
    padding: 22px 32px;
    gap: 18px;
    border: 3px solid #2b1f10;
}
.book {
    width: 52px;
    height: 150px;
    border-radius: 4px;
    border: 2px solid rgba(0,0,0,0.6);
    box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
}
.tall { height: 170px; }
.short { height: 120px; }
.red    { background: #7b2e2e; }
.blue   { background: #2e4a7b; }
.green  { background: #2e7b4a; }
.yellow { background: #b89b3b; }
.purple { background: #5b2e7b; }
.desk {
    width: 100%;
    height: 340px;
    background: #3f2b17;
    position: absolute;
    bottom: 0;
    box-shadow: 0 -12px 35px rgba(0,0,0,0.9);
    border-top: 4px solid #2b1f10;
}
.notes {
    position: absolute;
    bottom: 50px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 60px;
}
.note {
    width: 240px;
    height: 240px;
    background: #fff7a1;
    border: 2px solid #d6c56f;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    color: #3b2a15;
}
.note:hover { transform: scale(1.1) rotate(-3deg); }
.section {
    display: none;
    position: absolute;
    top: 190px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    max-height: 60%;
    overflow-y: auto;
    background: rgba(255,255,255,0.97);
    color: #2b1f10;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 0 30px black;
    font-size: 22px;
}
.close-btn {
    font-size: 40px;
    cursor: pointer;
    float: right;
}
input, select, textarea {
    font-size: 22px;
    padding: 12px;
    margin: 10px 0;
    width: 100%;
}
button {
    font-size: 22px;
    padding: 12px 24px;
    margin: 10px 10px 10px 0;
    cursor: pointer;
}
.item-row {
    margin: 12px 0;
    padding: 12px;
    border-radius: 10px;
    background: #f3f3f3;
}
.note-paper {
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 15px;
    min-height: 220px;
    margin-top: 10px;
}
.lined {
    background-image: linear-gradient(to bottom, #ddd 1px, transparent 1px);
    background-size: 100% 28px;
}
.square {
    background-image:
        linear-gradient(#ddd 1px, transparent 1px),
        linear-gradient(90deg, #ddd 1px, transparent 1px);
    background-size: 28px 28px;
}
</style>

<script>
const SERVER_URL = "http://localhost:8000"; // Change to your online server URL later

function openSection(id){document.getElementById(id).style.display="block";}
function closeSection(id){document.getElementById(id).style.display="none";}
function saveData(k,v){localStorage.setItem(k,JSON.stringify(v));}
function loadData(k,f){let v=localStorage.getItem(k);return v?JSON.parse(v):f;}

/* QUIZ */
let quizzes=loadData("quizzes",[]);
function addQuizQuestion(){
    let t=quizTopic.value.trim(),ty=quizType.value,q=quizQuestion.value.trim(),c=quizCorrect.value.trim(),o=quizOptions.value.trim();
    if(!t||!q||!c)return;
    quizzes.push({t,ty,q,c,o});saveData("quizzes",quizzes);renderQuizzes();
}
function renderQuizzes(){
    quizList.innerHTML="";
    quizzes.forEach((x,i)=>{
        quizList.innerHTML+=`<div class="item-row"><strong>${x.t}</strong><br>${x.q}<br><input placeholder="Your answer" onblur="checkQuizAnswer(${i},this.value)"></div>`;
    });
}
function checkQuizAnswer(i,a){
    quizResult.textContent=(a.trim().toLowerCase()==quizzes[i].c.trim().toLowerCase())?"Correct! ✅":`Wrong ❌. Correct: ${quizzes[i].c}`;
}
function deleteAllQuizzes(){quizzes=[];saveData("quizzes",quizzes);renderQuizzes();quizResult.textContent="";}

async function generateAIQuiz(){
    const topic=quizTopic.value.trim();
    if(!topic)return;
    quizResult.textContent="AI is generating...";
    const response=await fetch(`${SERVER_URL}/solve-text`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({mode:"quiz",content:topic})
    });
    const raw=await response.json();
    let arr;
    try{arr=JSON.parse(raw.result);}catch(e){quizResult.textContent="AI JSON error";return;}
    arr.forEach(q=>{
        quizzes.push({
            t:topic,
            ty:q.type,
            q:q.question,
            c:q.correct||"",
            o:JSON.stringify(q.options||q.pairs||[])
        });
    });
    saveData("quizzes",quizzes);
    renderQuizzes();
    quizResult.textContent="AI quiz added.";
}

/* FLASHCARDS */
let flashcards=loadData("flashcards",[]);
function addFlashcard(){
    let f=flashFront.value.trim(),b=flashBack.value.trim();
    if(!f||!b)return;
    flashcards.push({f,b});saveData("flashcards",flashcards);renderFlashcards();
}
function renderFlashcards(){
    flashList.innerHTML="";
    flashcards.forEach((x,i)=>{
        flashList.innerHTML+=`<div class="item-row"><div onclick="flipFlashcard(${i})" id="fc${i}" data-side="front"><strong>${x.f}</strong><br><span style="color:#888;">(tap)</span></div></div>`;
    });
}
function flipFlashcard(i){
    let el=document.getElementById("fc"+i),x=flashcards[i];
    if(el.dataset.side=="back"){el.innerHTML=`<strong>${x.f}</strong><br><span style="color:#888;">(tap)</span>`;el.dataset.side="front";}
    else{el.innerHTML=`<strong>${x.b}</strong><br><span style="color:#888;">(tap)</span>`;el.dataset.side="back";}
}
function deleteAllFlashcards(){flashcards=[];saveData("flashcards",flashcards);renderFlashcards();}

async function generateAIFlashcards(){
    const topic=flashFront.value.trim();
    if(!topic)return;
    const response=await fetch(`${SERVER_URL}/solve-text`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({mode:"flashcards",content:topic})
    });
    const raw=await response.json();
    let arr;
    try{arr=JSON.parse(raw.result);}catch(e){alert("AI JSON error");return;}
    arr.forEach(c=>flashcards.push({f:c.front,b:c.back}));
    saveData("flashcards",flashcards);
    renderFlashcards();
}

/* VIRTUAL TEACHER */
async function handleTeacherUpload(){
    const fileInput=document.getElementById("teacherFile");
    const info=document.getElementById("teacherInfo");
    if(fileInput.files.length===0){
        info.textContent="Please upload a photo.";
        return;
    }
    info.textContent="Thinking...";
    const formData=new FormData();
    formData.append("image",fileInput.files[0]);
    const response=await fetch(`${SERVER_URL}/solve-image`,{
        method:"POST",
        body:formData
    });
    const data=await response.json();
    info.textContent=data.result;
}

/* NOTES + AI MODES */
let notes=loadData("notesData",[]),cur=null;
function newNote(){cur=notes.length;notes.push({p:"lined",bg:"#fff",c:""});saveData("notesData",notes);loadNote(cur);renderNotesList();}
function loadNote(i){cur=i;let n=notes[i];notePaper.className="note-paper "+n.p;notePaper.style.backgroundColor=n.bg;noteText.value=n.c;}
function setPaper(p){if(cur==null)return;notes[cur].p=p;saveData("notesData",notes);loadNote(cur);}
function setPaperColor(c){if(cur==null)return;notes[cur].bg=c;saveData("notesData",notes);loadNote(cur);}
function updateNoteContent(){if(cur==null)return;notes[cur].c=noteText.value;saveData("notesData",notes);}
function renderNotesList(){
    notesList.innerHTML="";
    notes.forEach((x,i)=>{notesList.innerHTML+=`<div class="item-row"><strong>Note ${i+1}</strong> <button onclick="loadNote(${i})">Open</button></div>`;});
}
function deleteAllNotes(){notes=[];saveData("notesData",notes);noteText.value="";cur=null;renderNotesList();}

async function callNotesAI(mode){
    const text=noteText.value;
    if(!text.trim())return;
    const response=await fetch(`${SERVER_URL}/solve-text`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({mode,content:text})
    });
    const data=await response.json();
    alert("AI says:\n\n"+data.result);
}

window.onload=function(){renderQuizzes();renderFlashcards();renderNotesList();}
</script>
</head>

<body>

<div class="back">←</div>
<div class="title">Knowledge Studio 📖</div>

<div class="library">
    <script>
        const colors=["red","blue","green","yellow","purple"];
        for(let s=0;s<4;s++){
            document.write('<div class="shelf">');
            for(let b=0;b<14;b++){
                let c=colors[Math.floor(Math.random()*colors.length)];
                let h=[""," tall"," short"][Math.floor(Math.random()*3)];
                document.write(`<div class="book ${c}${h}"></div>`);
            }
            document.write('</div>');
        }
    </script>
</div>

<div class="desk"></div>

<div class="notes">
    <div class="note" onclick="openSection('quizSection')">Quiz Generator</div>
    <div class="note" onclick="openSection('flashSection')">Flashcards</div>
    <div class="note" onclick="openSection('teacherSection')">Virtual Teacher</div>
    <div class="note" onclick="openSection('notesSection')">Notetaking + AI</div>
</div>

<div class="section" id="quizSection">
    <div class="close-btn" onclick="closeSection('quizSection')">✖</div>
    <h2>Quiz Generator</h2>
    <input id="quizTopic" placeholder="Topic">
    <select id="quizType">
        <option>Multiple Choice</option>
        <option>True/False</option>
        <option>Matching</option>
    </select>
    <input id="quizQuestion" placeholder="Question">
    <input id="quizCorrect" placeholder="Correct answer">
    <textarea id="quizOptions" placeholder="Options or matching info"></textarea>
    <button onclick="addQuizQuestion()">Add</button>
    <button onclick="deleteAllQuizzes()">Delete All</button>
    <button onclick="generateAIQuiz()">AI Generate Quiz</button>
    <h3>Saved Questions</h3>
    <div id="quizList"></div>
    <div id="quizResult" style="margin-top:10px;font-weight:bold;"></div>
</div>

<div class="section" id="flashSection">
    <div class="close-btn" onclick="closeSection('flashSection')">✖</div>
    <h2>Flashcards</h2>
    <input id="flashFront" placeholder="Front (or topic for AI)">
    <input id="flashBack" placeholder="Back">
    <button onclick="addFlashcard()">Add</button>
    <button onclick="deleteAllFlashcards()">Delete All</button>
    <button onclick="generateAIFlashcards()">AI Generate Flashcards</button>
    <h3>Saved Flashcards</h3>
    <div id="flashList"></div>
</div>

<div class="section" id="teacherSection">
    <div class="close-btn" onclick="closeSection('teacherSection')">✖</div>
    <h2>Virtual Teacher</h2>
    <input type="file" id="teacherFile" accept="image/*">
    <button onclick="handleTeacherUpload()">Upload & Explain</button>
    <p id="teacherInfo" style="white-space:pre-wrap;"></p>
</div>

<div class="section" id="notesSection">
    <div class="close-btn" onclick="closeSection('notesSection')">✖</div>
    <h2>Notetaking + AI</h2>
    <button onclick="newNote()">New Note</button>
    <button onclick="deleteAllNotes()">Delete All</button>
    <h3>Your Notes</h3>
    <div id="notesList"></div>
    <h3>Current Note</h3>
    <button onclick="setPaper('lined')">Lined</button>
    <button onclick="setPaper('square')">Square</button>
    <button onclick="setPaperColor('#fff')">White</button>
    <button onclick="setPaperColor('#fff7a1')">Yellow</button>
    <button onclick="setPaperColor('#e0f7ff')">Blue</button>
    <div id="notePaper" class="note-paper lined">
        <textarea id="noteText" oninput="updateNoteContent()" placeholder="Type..."></textarea>
    </div>
    <h3>AI Modes</h3>
    <button onclick="callNotesAI('math')">AI Math Solver</button>
    <button onclick="callNotesAI('textbook')">AI Textbook Explainer</button>
    <button onclick="callNotesAI('language')">AI Language Tutor</button>
    <button onclick="callNotesAI('handwriting')">AI Handwriting Cleanup</button>
</div>

</body>
</html>
