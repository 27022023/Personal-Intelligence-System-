<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>knowledge</title>
<style>
body{margin:0;font-family:Georgia;background:#15100b;color:#f5e9c8;}
.top-bar{display:flex;align-items:center;justify-content:center;gap:30px;margin-top:10px;}
.back-arrow{font-size:32px;cursor:pointer;}
.title{text-align:center;font-size:40px;text-shadow:0 0 20px #f5e9c8;}
.library{position:fixed;top:80px;left:0;width:100%;height:calc(100% - 80px);background:radial-gradient(circle at top,#cfa96b 0%,#2b1f10 40%,#15100b 100%);z-index:1;}
.shelf{width:94%;height:120px;background:#3b2a15;margin:10px auto;border-radius:12px;box-shadow:inset 0 0 20px rgba(0,0,0,0.8),0 8px 16px rgba(0,0,0,0.7);display:flex;align-items:flex-end;padding:14px;gap:8px;}
.book{width:26px;height:90px;border-radius:4px;border:2px solid rgba(0,0,0,0.6);box-shadow:inset 0 0 10px rgba(0,0,0,0.5);}
.tall{height:105px;}
.short{height:75px;}
.red{background:#7b2e2e;}
.blue{background:#2e4a7b;}
.green{background:#2e7b4a;}
.yellow{background:#b89b3b;}
.purple{background:#5b2e7b;}
.desk{width:100%;height:190px;background:#3f2b17;position:absolute;bottom:0;z-index:2;}
.notes{position:absolute;bottom:20px;width:100%;display:flex;justify-content:center;gap:10px;z-index:3;flex-wrap:wrap;}
.note{width:140px;height:140px;background:#d8c3a5;border:3px solid #b89b7a;border-radius:16px;box-shadow:0 0 15px rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;font-size:20px;font-weight:bold;cursor:pointer;color:#4a3b2b;text-align:center;}
.note:hover{transform:scale(1.05);background:#e3d2bd;}
.section{display:none;position:absolute;top:90px;left:50%;transform:translateX(-50%);width:92%;max-height:65%;overflow-y:auto;background:white;color:#2b1f10;padding:14px;border-radius:16px;box-shadow:0 0 20px black;font-size:16px;z-index:4;}
.close-btn{float:right;font-size:24px;cursor:pointer;}
input,textarea{width:100%;font-size:16px;padding:8px;margin:8px 0;border-radius:10px;border:2px solid #c9b2e8;background:#f7f2ff;}
button{font-size:15px;padding:6px 10px;margin:6px 6px 6px 0;background:#d8c3a5;border:2px solid #b89b7a;border-radius:10px;color:#4a3b2b;cursor:pointer;}
button:hover{background:#e3d2bd;}
.item-row{background:#e6d6f5;border:2px solid #c9b2e8;padding:10px;margin:8px 0;border-radius:12px;font-size:14px;}
.quiz-answer{display:inline-block;margin:3px 4px;padding:5px 8px;border-radius:8px;background:#f7f2ff;border:2px solid #c9b2e8;cursor:pointer;}
.quiz-answer.correct{background:#9adf9a;}
.quiz-answer.wrong{background:#f7a6c7;}
.match-container{display:flex;gap:10px;margin-top:8px;}
.match-column{flex:1;}
.match-item{padding:5px 8px;margin:3px 0;border-radius:8px;background:#f7f2ff;border:2px solid #c9b2e8;cursor:pointer;font-size:14px;}
.match-item.selected{background:#9ac7df;}
.match-item.matched{background:#9adf9a;}
.notebook{width:100%;margin:10px auto;background:white;border-radius:12px;padding:10px;box-shadow:0 0 15px rgba(0,0,0,0.4);}
#note{width:100%;min-height:40vh;font-size:15px;line-height:20px;outline:none;border:none;background:transparent;color:#3b2f2f;}
.page-btn{background:#d8c3a5;border:2px solid #b89b7a;color:#4a3b2b;padding:5px 8px;font-size:13px;border-radius:8px;cursor:pointer;margin:0 3px;}
.page-btn:hover{background:#e3d2bd;}
.active{background:#b89b7a!important;color:white!important;}
.tools{margin-bottom:8px;}
.hl-btn{border-radius:8px;border:1px solid #4a3b2b;padding:4px 6px;font-size:12px;margin-right:4px;cursor:pointer;}
</style>
<script>
function openSection(id){document.querySelectorAll('.section').forEach(s=>s.style.display='none');document.getElementById(id).style.display='block';}
function closeSection(id){document.getElementById(id).style.display='none';}
function goHome(){location.reload();}

/* QUIZ */
let currentQuiz={mcq:[],tf:[],matchA:[],matchB:[],pairs:[]},matchSelection={a:null,b:null};
function generateQuiz(){
  const t=document.getElementById("quizTopic").value.trim();
  const out=document.getElementById("quizList");
  const result=document.getElementById("quizResult");
  if(!t){out.innerHTML="";result.textContent="Type a topic first.";return;}
  const core=t.split(" ").pop();
  const mcq=[
    {q:`What is the main idea behind ${t}?`,
     options:[
       `${t} explains how ${core} behaves or affects something.`,
       `${t} is random and has no meaning.`,
       `${t} is only used in jokes.`,
       `${t} cannot be studied or understood.`
     ],correct:0},
    {q:`Where does ${t} usually appear?`,
     options:[
       `In real situations involving ${core}.`,
       `Only in fictional stories.`,
       `Only in ancient myths.`,
       `It never appears anywhere.`
     ],correct:0}
  ];
  const tf=[
    {q:`${t} has real applications.`,correct:true},
    {q:`${t} cannot be explained or used.`,correct:false}
  ];
  const matchA=[`${t} – definition`,`${t} – example`,`${t} – key idea`];
  const matchB=[`What ${t} means.`,`Where ${t} appears in real life.`,`The most important thing about ${t}.`];
  currentQuiz={mcq,tf,matchA,matchB,pairs:[0,1,2]};
  renderQuiz();
  result.textContent="Quiz generated!";
}
function renderQuiz(){
  const out=document.getElementById("quizList");
  out.innerHTML="";
  currentQuiz.mcq.forEach((qObj,qi)=>{
    let html=`<div class="item-row"><b>Q: ${qObj.q}</b><br>`;
    qObj.options.forEach((opt,oi)=>{
      html+=`<span class="quiz-answer" onclick="checkMCQ(${qi},${oi},this)">${opt}</span>`;
    });
    html+="</div>";
    out.innerHTML+=html;
  });
  currentQuiz.tf.forEach((qObj,qi)=>{
    let html=`<div class="item-row"><b>Q: ${qObj.q}</b><br>`;
    html+=`<span class="quiz-answer" onclick="checkTF(${qi},true,this)">True</span>`;
    html+=`<span class="quiz-answer" onclick="checkTF(${qi},false,this)">False</span>`;
    html+="</div>";
    out.innerHTML+=html;
  });
  let html=`<div class="item-row"><b>Match the items:</b><div class="match-container"><div class="match-column"><b>Pile A</b>`;
  currentQuiz.matchA.forEach((item,i)=>{
    html+=`<div class="match-item" onclick="selectMatch('a',${i},this)" data-index="${i}">${item}</div>`;
  });
  html+=`</div><div class="match-column"><b>Pile B</b>`;
  currentQuiz.matchB.forEach((item,i)=>{
    html+=`<div class="match-item" onclick="selectMatch('b',${i},this)" data-index="${i}">${item}</div>`;
  });
  html+="</div></div></div>";
  out.innerHTML+=html;
  matchSelection={a:null,b:null};
}
function checkMCQ(qIndex,optIndex,el){
  const q=currentQuiz.mcq[qIndex];
  const correct=(optIndex===q.correct);
  const parent=el.parentElement;
  parent.querySelectorAll('.quiz-answer').forEach(a=>a.classList.remove('correct','wrong'));
  el.classList.add(correct?'correct':'wrong');
}
function checkTF(qIndex,answer,el){
  const q=currentQuiz.tf[qIndex];
  const correct=(answer===q.correct);
  const parent=el.parentElement;
  parent.querySelectorAll('.quiz-answer').forEach(a=>a.classList.remove('correct','wrong'));
  el.classList.add(correct?'correct':'wrong');
}
function selectMatch(side,index,el){
  if(el.classList.contains('matched'))return;
  const container=el.parentElement;
  container.querySelectorAll('.match-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  matchSelection[side]={index,el};
  if(matchSelection.a&&matchSelection.b){
    const aIndex=matchSelection.a.index;
    const bIndex=matchSelection.b.index;
    const correctPairIndex=currentQuiz.pairs[aIndex];
    if(bIndex===correctPairIndex){
      matchSelection.a.el.classList.remove('selected');
      matchSelection.b.el.classList.remove('selected');
      matchSelection.a.el.classList.add('matched');
      matchSelection.b.el.classList.add('matched');
    }else{
      matchSelection.a.el.classList.add('wrong');
      matchSelection.b.el.classList.add('wrong');
      setTimeout(()=>{
        matchSelection.a.el.classList.remove('selected','wrong');
        matchSelection.b.el.classList.remove('selected','wrong');
      },500);
    }
    matchSelection={a:null,b:null};
  }
}

/* FLASHCARDS */
let cards=[];
function addCard(){
  const f=document.getElementById("flashF").value.trim();
  const b=document.getElementById("flashB").value.trim();
  if(!f||!b)return;
  cards.push({f,b});
  renderCards();
}
function renderCards(){
  const flashList=document.getElementById("flashList");
  flashList.innerHTML="";
  cards.forEach((x,i)=>{
    flashList.innerHTML+=`<div class="item-row" onclick="flip(${i})" id="c${i}" data-side="f"><b>${x.f}</b></div>`;
  });
}
function flip(i){
  const el=document.getElementById("c"+i);
  const x=cards[i];
  if(el.dataset.side==="f"){el.innerHTML="<b>"+x.b+"</b>";el.dataset.side="b";}
  else{el.innerHTML="<b>"+x.f+"</b>";el.dataset.side="f";}
}
function saveFlashcards(){localStorage.setItem("ks_flashcards",JSON.stringify(cards));}
function deleteFlashcards(){
  if(!confirm("Delete all flashcards?"))return;
  cards=[];
  localStorage.removeItem("ks_flashcards");
  renderCards();
}
function loadFlashcards(){
  const raw=localStorage.getItem("ks_flashcards");
  cards=raw?JSON.parse(raw):[];
  renderCards();
}

/* TEACHER */
function teacherExplain(){
  const t=document.getElementById("teacherQuestion").value.trim();
  const out=document.getElementById("teacherOut");
  if(!t){out.textContent="Type a topic.";return;}
  const words=t.split(" ");
  const main=words[words.length-1];
  out.textContent=
    `Topic: ${t}\n\n`+
    `1. What it means:\n`+
    `   ${t} refers to a concept involving ${main}. It is used to\n`+
    `   describe, measure, or explain something in its field.\n\n`+
    `2. Why it matters:\n`+
    `   Understanding ${t} helps you see how ${main} affects real situations,\n`+
    `   decisions, or systems.\n\n`+
    `3. How it works:\n`+
    `   Break ${t} into smaller parts:\n`+
    `   - What it describes\n`+
    `   - What causes it\n`+
    `   - What changes it\n`+
    `   - What results from it\n\n`+
    `4. Real example:\n`+
    `   Think of a real scenario where ${t} appears. Describe what happens,\n`+
    `   why it happens, and what ${main} influences.\n\n`+
    `5. How to remember it:\n`+
    `   Create a short rule: “${t} is the idea that explains how ${main} behaves.”`;
}
function saveTeacher(){localStorage.setItem("ks_teacher",document.getElementById("teacherOut").textContent);}
function deleteTeacher(){
  if(!confirm("Delete explanation?"))return;
  localStorage.removeItem("ks_teacher");
  document.getElementById("teacherOut").textContent="";
}
function loadTeacher(){
  const saved=localStorage.getItem("ks_teacher");
  if(saved)document.getElementById("teacherOut").textContent=saved;
}

/* NOTEBOOK + HIGHLIGHTER */
let pages=[],currentPage=0;
function loadNotebook(){
  const saved=localStorage.getItem("KS_Notebook_Pages");
  pages=saved?JSON.parse(saved):[""];
  renderPages();
  loadPage(0);
}
function savePages(){localStorage.setItem("KS_Notebook_Pages",JSON.stringify(pages));}
function loadPage(i){
  currentPage=i;
  document.getElementById("note").innerHTML=pages[i];
  updateActiveButton();
}
function saveCurrentPage(){
  pages[currentPage]=document.getElementById("note").innerHTML;
  savePages();
}
function addPage(){
  pages.push("");
  savePages();
  renderPages();
  loadPage(pages.length-1);
}
function renderPages(){
  const container=document.getElementById("pageButtons");
  container.innerHTML="";
  pages.forEach((_,i)=>{
    container.innerHTML+=`<button class="page-btn" onclick="loadPage(${i})">Page ${i+1}</button>`;
  });
}
function updateActiveButton(){
  const buttons=document.querySelectorAll(".page-btn");
  buttons.forEach((btn,i)=>btn.classList.toggle('active',i===currentPage));
}
function highlight(color){
  let sel=window.getSelection();
  if(!sel.rangeCount)return;
  let range=sel.getRangeAt(0);
  let span=document.createElement("span");
  span.style.backgroundColor=(color==="clear")?"transparent":color;
  range.surroundContents(span);
  saveCurrentPage();
}

/* INIT */
window.onload=function(){
  loadFlashcards();
  loadTeacher();
  loadNotebook();
};
</script>
</head>
<body>
<div class="top-bar">
  <div class="back-arrow" onclick="goHome()">←</div>
  <div class="title">Knowledge Studio</div>
</div>

<div class="library">
<script>
const colors=["red","blue","green","yellow","purple"];
for(let s=0;s<5;s++){
  document.write('<div class="shelf">');
  for(let b=0;b<12;b++){
    let c=colors[Math.floor(Math.random()*colors.length)];
    let h=[""," tall"," short"][Math.floor(Math.random()*3)];
    document.write(`<div class="book ${c}${h}"></div>`);
  }
  document.write('</div>');
}
</script>
</div>

<div class="desk"></div>

<div class="notes">
  <div class="note" onclick="openSection('quizSection')">Quiz</div>
  <div class="note" onclick="openSection('flashSection')">Flashcards</div>
  <div class="note" onclick="openSection('teacherSection')">Teacher</div>
  <div class="note" onclick="openSection('notebookSection')">Notebook</div>
</div>

<div class="section" id="quizSection">
  <div class="close-btn" onclick="closeSection('quizSection')">✖</div>
  <h2>Automated Interactive Quiz</h2>
  <input id="quizTopic" placeholder="Type any topic">
  <button onclick="generateQuiz()">Generate Quiz</button>
  <div id="quizList"></div>
  <div id="quizResult" style="margin-top:6px;"></div>
</div>

<div class="section" id="flashSection">
  <div class="close-btn" onclick="closeSection('flashSection')">✖</div>
  <h2>Flashcards</h2>
  <input id="flashF" placeholder="Front">
  <input id="flashB" placeholder="Back">
  <button onclick="addCard()">Add</button>
  <button onclick="saveFlashcards()">Save</button>
  <button onclick="deleteFlashcards()">Delete</button>
  <div id="flashList"></div>
</div>

<div class="section" id="teacherSection">
  <div class="close-btn" onclick="closeSection('teacherSection')">✖</div>
  <h2>Teacher Helper</h2>
  <input id="teacherQuestion" placeholder="What do you want explained?">
  <button onclick="teacherExplain()">Explain</button>
  <button onclick="saveTeacher()">Save Explanation</button>
  <button onclick="deleteTeacher()">Delete Explanation</button>
  <p id="teacherOut" style="white-space:pre-wrap;margin-top:8px;"></p>
</div>

<div class="section" id="notebookSection">
  <div class="close-btn" onclick="closeSection('notebookSection')">✖</div>
  <h2>Notebook</h2>
  <div id="pageButtons" style="margin-bottom:6px;"></div>
  <div class="tools">
    <button class="hl-btn" style="background:#f7d96f" onclick="highlight('#f7d96f')">Yellow</button>
    <button class="hl-btn" style="background:#f7a6c7" onclick="highlight('#f7a6c7')">Pink</button>
    <button class="hl-btn" style="background:#9adf9a" onclick="highlight('#9adf9a')">Green</button>
    <button class="hl-btn" style="background:#9ac7df" onclick="highlight('#9ac7df')">Blue</button>
    <button class="hl-btn" style="background:#b0a8a8" onclick="highlight('clear')">Clear</button>
  </div>
  <div class="notebook">
    <div id="note" contenteditable="true" oninput="saveCurrentPage()"></div>
  </div>
  <div style="text-align:center;margin-top:6px;">
    <button class="page-btn" onclick="addPage()">➕ Add Page</button>
  </div>
</div>
</body>
</html>
