<script>

  document.getElementById(id).style.display = 'block';
}
function closeSection(id){
  document.getElementById(id).style.display = 'none';

function goHome(){ window.location.href = "index.html"; }

/* QUIZ – automated, interactive, mixed, more specific */
let currentQuiz = { mcq: [], tf: [], matchA: [], matchB: [], pairs: [] };
let matchSelection = { a: null, b: null };

function classifyTopic(topic){
  const t = topic.toLowerCase();
  if(t.match(/photosynthesis|cell|chlorophyll|plant/)) return "biology";
  if(t.match(/fraction|algebra|equation|geometry|angle|triangle|integral|derivative/)) return "math";
  if(t.match(/world war|revolution|empire|ancient|medieval|history/)) return "history";
  if(t.match(/atom|force|energy|velocity|gravity|motion|physics/)) return "physics";
  if(t.match(/climate|ecosystem|environment|pollution|sustainability/)) return "environment";
  return "general";
}

function generateQuiz(){
  const topic = document.getElementById("quizTopic").value.trim();
  const out = document.getElementById("quizList");
  const result = document.getElementById("quizResult");
  if(!topic){
    out.innerHTML = "";
    result.textContent = "Type a topic first.";
    return;
  }

  const domain = classifyTopic(topic);

  let mcq = [];
  let tf = [];
  let matchA = [];
  let matchB = [];

  if(domain === "biology"){
    mcq = [
      {
        q: `What is the main purpose of ${topic}?`,
        options: [
          "To convert light energy into chemical energy (glucose).",
          "To break down glucose into ATP in mitochondria.",
          "To transport water through xylem.",
          "To store genetic information."
        ],
        correct: 0
      },
      {
        q: `Where does ${topic} mainly occur in plants?`,
        options: [
          "In the chloroplasts of leaf cells.",
          "In the nucleus of root cells.",
          "In the cell membrane of stem cells.",
          "In the vacuoles of flower cells."
        ],
        correct: 0
      }
    ];
    tf = [
      { q: `${topic} requires light, water, and carbon dioxide.`, correct: true },
      { q: `Oxygen is the main product of ${topic} and no glucose is formed.`, correct: false }
    ];
    matchA = [
      "Chlorophyll",
      "Chloroplast",
      "Carbon dioxide",
      "Glucose"
    ];
    matchB = [
      "Pigment that absorbs light energy.",
      "Organelle where photosynthesis happens.",
      "Gas taken in from the air for photosynthesis.",
      "Sugar produced as chemical energy."
    ];
  } else if(domain === "math"){
    mcq = [
      {
        q: `What does ${topic} usually help you do?`,
        options: [
          "Represent and solve numerical relationships or problems.",
          "Describe historical events.",
          "Explain chemical reactions.",
          "Measure only physical forces."
        ],
        correct: 0
      },
      {
        q: `Which statement about ${topic} is most accurate?`,
        options: [
          "It often involves symbols and rules to manipulate them.",
          "It is only about drawing shapes.",
          "It never uses numbers.",
          "It is only used in art."
        ],
        correct: 0
      }
    ];
    tf = [
      { q: `${topic} can be used to model real-world situations.`, correct: true },
      { q: `${topic} is never connected to graphs or visual representations.`, correct: false }
    ];
    matchA = [
      "Variable",
      "Equation",
      "Fraction",
      "Function"
    ];
    matchB = [
      "Symbol that can represent different values.",
      "Statement showing two expressions are equal.",
      "Number written as a ratio of two integers.",
      "Rule that assigns each input exactly one output."
    ];
  } else if(domain === "history"){
    mcq = [
      {
        q: `What is a key idea related to ${topic}?`,
        options: [
          "It changed political or social structures significantly.",
          "It only affected one single person.",
          "It had no impact on any country.",
          "It was purely fictional."
        ],
        correct: 0
      },
      {
        q: `How is ${topic} usually studied?`,
        options: [
          "By looking at causes, events, and consequences.",
          "By ignoring primary sources.",
          "By focusing only on myths.",
          "By avoiding timelines."
        ],
        correct: 0
      }
    ];
    tf = [
      { q: `${topic} is connected to specific dates and places.`, correct: true },
      { q: `Historians never disagree about interpretations of ${topic}.`, correct: false }
    ];
    matchA = [
      "Cause",
      "Event",
      "Consequence",
      "Primary source"
    ];
    matchB = [
      "Reason why something happened.",
      "What actually took place.",
      "Result or impact after the event.",
      "Original document or record from the time."
    ];
  } else if(domain === "physics"){
    mcq = [
      {
        q: `What does ${topic} mainly deal with?`,
        options: [
          "How matter and energy behave.",
          "Only how plants grow.",
          "Only how languages change.",
          "Only how computers store data."
        ],
        correct: 0
      },
      {
        q: `Which statement about ${topic} is most accurate?`,
        options: [
          "It often uses formulas to describe motion or forces.",
          "It never uses numbers.",
          "It ignores experiments.",
          "It is purely about art."
        ],
        correct: 0
      }
    ];
    tf = [
      { q: `${topic} can be tested with experiments and measurements.`, correct: true },
      { q: `${topic} never uses units like meters or seconds.`, correct: false }
    ];
    matchA = [
      "Force",
      "Velocity",
      "Acceleration",
      "Energy"
    ];
    matchB = [
      "Push or pull acting on an object.",
      "Speed with a direction.",
      "Rate of change of velocity.",
      "Capacity to do work."
    ];
  } else if(domain === "environment"){
    mcq = [
      {
        q: `What is a central idea of ${topic}?`,
        options: [
          "How living things and their surroundings interact.",
          "Only how numbers are added.",
          "Only how stories are written.",
          "Only how machines are built."
        ],
        correct: 0
      },
      {
        q: `Why is ${topic} important today?`,
        options: [
          "It helps us understand and protect ecosystems.",
          "It has no impact on real life.",
          "It is only used in games.",
          "It is only about ancient myths."
        ],
        correct: 0
      }
    ];
    tf = [
      { q: `${topic} can be affected by human activities.`, correct: true },
      { q: `Pollution never changes anything related to ${topic}.`, correct: false }
    ];
    matchA = [
      "Ecosystem",
      "Climate change",
      "Pollution",
      "Sustainability"
    ];
    matchB = [
      "Community of living things and their environment.",
      "Long-term change in temperature and weather patterns.",
      "Introduction of harmful substances into environment.",
      "Using resources so they last for future generations."
    ];
  } else {
    mcq = [
      {
        q: `Which statement best describes ${topic}?`,
        options: [
          `${topic} is a concept with specific meaning in its field.`,
          `${topic} is random and has no definition.`,
          `${topic} is only used in jokes.`,
          `${topic} is a secret code with no rules.`
        ],
        correct: 0
      },
      {
        q: `How should you study ${topic}?`,
        options: [
          "By learning its definition, examples, and how it is used.",
          "By memorizing it without understanding.",
          "By ignoring any examples.",
          "By never asking questions about it."
        ],
        correct: 0
      }
    ];
    tf = [
      { q: `${topic} has a definition you can look up and understand.`, correct: true },
      { q: `There is no way to find information about ${topic}.`, correct: false }
    ];
    matchA = [
      `${topic} – definition`,
      `${topic} – example`,
      `${topic} – key idea`
    ];
    matchB = [
      `Clear statement of what ${topic} means.`,
      `A situation where ${topic} appears in real life.`,
      `The most important thing to remember about ${topic}.`
    ];
  }

  currentQuiz.mcq = mcq;
  currentQuiz.tf = tf;
  currentQuiz.matchA = matchA;
  currentQuiz.matchB = matchB;
  currentQuiz.pairs = matchA.map((_, i) => i);

  renderQuiz();
  result.textContent = "Quiz generated!";
}

function renderQuiz(){
  const out = document.getElementById("quizList");
  out.innerHTML = "";

  currentQuiz.mcq.forEach((qObj, qi) => {
    let html = `<div class="item-row"><b>Q: ${qObj.q}</b><br>`;
    qObj.options.forEach((opt, oi) => {
      html += `<span class="quiz-answer" onclick="checkMCQ(${qi},${oi},this)">${opt}</span>`;
    });
    html += `</div>`;
    out.innerHTML += html;
  });

  currentQuiz.tf.forEach((qObj, qi) => {
    let html = `<div class="item-row"><b>Q: ${qObj.q}</b><br>`;
    html += `<span class="quiz-answer" onclick="checkTF(${qi},true,this)">True</span>`;
    html += `<span class="quiz-answer" onclick="checkTF(${qi},false,this)">False</span>`;
    html += `</div>`;
    out.innerHTML += html;
  });

  let html = `<div class="item-row"><b>Match the items:</b>
  <div class="match-container">
    <div class="match-column"><b>Pile A</b>`;
  currentQuiz.matchA.forEach((item, i) => {
    html += `<div class="match-item" onclick="selectMatch('a',${i},this)" data-index="${i}">${item}</div>`;
  });
  html += `</div><div class="match-column"><b>Pile B</b>`;
  currentQuiz.matchB.forEach((item, i) => {
    html += `<div class="match-item" onclick="selectMatch('b',${i},this)" data-index="${i}">${item}</div>`;
  });
  html += `</div></div></div>`;
  out.innerHTML += html;

  matchSelection = { a: null, b: null };
}

function checkMCQ(qIndex, optIndex, el){
  const q = currentQuiz.mcq[qIndex];
  const correct = (optIndex === q.correct);
  const parent = el.parentElement;
  parent.querySelectorAll('.quiz-answer').forEach(a => {
    a.classList.remove('correct','wrong');
  });
  el.classList.add(correct ? 'correct' : 'wrong');
}

function checkTF(qIndex, answer, el){
  const q = currentQuiz.tf[qIndex];
  const correct = (answer === q.correct);
  const parent = el.parentElement;
  parent.querySelectorAll('.quiz-answer').forEach(a => {
    a.classList.remove('correct','wrong');
  });
  el.classList.add(correct ? 'correct' : 'wrong');
}

function selectMatch(side, index, el){
  if(el.classList.contains('matched')) return;

  const container = el.parentElement;
  container.querySelectorAll('.match-item').forEach(i => i.classList.remove('selected'));

  el.classList.add('selected');
  matchSelection[side] = { index, el };

  if(matchSelection.a && matchSelection.b){
    const aIndex = matchSelection.a.index;
    const bIndex = matchSelection.b.index;
    const correctPairIndex = currentQuiz.pairs[aIndex];

    if(bIndex === correctPairIndex){
      matchSelection.a.el.classList.remove('selected');
      matchSelection.b.el.classList.remove('selected');
      matchSelection.a.el.classList.add('matched');
      matchSelection.b.el.classList.add('matched');
    } else {
      matchSelection.a.el.classList.add('wrong');
      matchSelection.b.el.classList.add('wrong');
      setTimeout(() => {
        matchSelection.a.el.classList.remove('selected','wrong');
        matchSelection.b.el.classList.remove('selected','wrong');
      }, 600);
    }
    matchSelection = { a:null, b:null };
  }
}

/* FLASHCARDS */
let cards=[];
function addCard(){
  const f=document.getElementById("flashF").value;
  const b=document.getElementById("flashB").value;
  if(!f.trim()||!b.trim())return;
  cards.push({f,b});
  renderCards();
}
function renderCards(){
  const flashList=document.getElementById("flashList");
  flashList.innerHTML="";
  cards.forEach((x,i)=>{
    flashList.innerHTML+=`<div class='item-row' onclick='flip(${i})' id='c${i}' data='f'><b>${x.f}</b></div>`;
  });
}
function flip(i){
  let el=document.getElementById("c"+i),x=cards[i];
  if(el.dataset.data=="f"){el.innerHTML="<b>"+x.b+"</b>";el.dataset.data="b";}
  else{el.innerHTML="<b>"+x.f+"</b>";el.dataset.data="f";}
}
function saveFlashcards(){
  localStorage.setItem("ks_flashcards",JSON.stringify(cards));
}
function deleteFlashcards(){
  if(!confirm("Delete all flashcards?"))return;
  cards=[];
  localStorage.removeItem("ks_flashcards");
  renderCards();
}
function loadFlashcards(){
  const raw=localStorage.getItem("ks_flashcards");
  cards=raw?JSON.parse(raw):[];
  renderCards();
}

/* TEACHER – topic-aware explanation */
function teacherExplain(){
  const question = document.getElementById("teacherQuestion").value.trim();
  const out = document.getElementById("teacherOut");
  if(!question){
    out.textContent = "Type what you want explained.";
    return;
  }

  const domain = classifyTopic(question);
  let explanation = "";

  if(domain === "biology"){
    explanation =
      `Topic: ${question}\n\n` +
      `1. What it is:\n` +
      `   This belongs to biology and is connected to living things and their processes.\n` +
      `   Often it involves cells, organs, or systems in plants or animals.\n\n` +
      `2. Core idea:\n` +
      `   Try to identify: Is it about how something grows, how energy is used,\n` +
      `   or how information is passed in living organisms?\n\n` +
      `3. Example:\n` +
      `   Imagine a real organism (like a plant or an animal) where ${question} appears.\n` +
      `   Describe what happens step by step.\n\n` +
      `4. How to remember:\n` +
      `   Turn it into a short sentence: “${question} is the process/idea that …”\n`;
  } else if(domain === "math"){
    explanation =
      `Topic: ${question}\n\n` +
      `1. What it is:\n` +
      `   This is a mathematical idea. It usually involves numbers, symbols, or shapes.\n` +
      `   It follows rules that let you solve problems or describe relationships.\n\n` +
      `2. Core idea:\n` +
      `   Ask: Is it about measuring, comparing, changing, or representing quantities?\n\n` +
      `3. Example:\n` +
      `   Create a simple problem using ${question}. Solve it step by step and\n` +
      `   explain why each step is allowed.\n\n` +
      `4. How to remember:\n` +
      `   Write: “${question} helps me understand how … changes or relates to …”\n`;
  } else if(domain === "history"){
    explanation =
      `Topic: ${question}\n\n` +
      `1. What it is:\n` +
      `   This is a historical topic. It is tied to specific times, places, and people.\n\n` +
      `2. Core idea:\n` +
      `   Think in terms of causes (why it happened), events (what happened),\n` +
      `   and consequences (what changed afterward).\n\n` +
      `3. Example:\n` +
      `   Place ${question} on a timeline. What came before it? What came after?\n` +
      `   How did it affect everyday life or politics?\n\n` +
      `4. How to remember:\n` +
      `   Summarize it in three parts: “Before, During, After ${question} …”\n`;
  } else if(domain === "physics"){
