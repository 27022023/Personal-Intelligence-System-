/* SUBJECT DETECTION */
function detectSubject(topic){
  topic=topic.toLowerCase();
  const bio=["cell","photosynthesis","enzyme","dna","protein","ecosystem","organism","evolution"];
  const chem=["reaction","acid","base","molecule","compound","bond","stoichiometry"];
  const phys=["force","energy","motion","velocity","quantum","gravity","electric","field"];
  const math=["fraction","algebra","geometry","calculus","equation","function","ratio","probability"];
  const hist=["war","revolution","empire","treaty","civilization","ancient","medieval","cold war"];
  const lit=["theme","symbol","metaphor","character","plot","poem","novel","tragedy"];
  const psych=["behavior","memory","cognition","emotion","motivation","personality","learning"];
  const econ=["market","inflation","supply","demand","trade","economy","price"];
  const geo=["climate","weather","plate","river","mountain","earth","continent"];

  function match(list){return list.some(w=>topic.includes(w));}

  if(match(bio))return "biology";
  if(match(chem))return "chemistry";
  if(match(phys))return "physics";
  if(match(math))return "math";
  if(match(hist))return "history";
  if(match(lit))return "literature";
  if(match(psych))return "psychology";
  if(match(econ))return "economics";
  if(match(geo))return "geography";
  return "general";
}

/* DEEP QUIZ */
let currentQuiz={mcq:[],tf:[],matchA:[],matchB:[],pairs:[]},matchSelection={a:null,b:null};
function generateQuiz(){
  const t=document.getElementById("quizTopic").value.trim();
  const out=document.getElementById("quizList");
  const result=document.getElementById("quizResult");
  if(!t){out.innerHTML="";result.textContent="Type a topic first.";return;}
  const subject=detectSubject(t);

  let mcq=[],tf=[],matchA=[],matchB=[],pairs=[];

  if(subject==="biology"){
    mcq=[
      {q:`At which level does ${t} primarily operate?`,
       options:["Molecular/cellular","Mythical","Random","Undefined"],correct:0},
      {q:`Which is a realistic example of ${t}?`,
       options:["A cell using ${t} in a pathway","A fairy tale","A magic spell","None"],correct:0}
    ];
    tf=[
      {q:`${t} can be explained using biological mechanisms.`,correct:true},
      {q:`${t} has no role in living systems.`,correct:false}
    ];
    matchA=[`${t} – molecule`,` ${t} – cell process`,` ${t} – organism effect`];
    matchB=[`Key molecule`,`Pathway in the cell`,`Impact on the organism`];
    pairs=[0,1,2];
  } else if(subject==="chemistry"){
    mcq=[
      {q:`${t} is mainly about:`,
       options:["How particles react","Magic","Randomness","Undefined"],correct:0},
      {q:`Which situation fits ${t}?`,
       options:["A real chemical reaction","A myth","A story with no atoms","None"],correct:0}
    ];
    tf=[
      {q:`${t} follows energy and stability rules.`,correct:true},
      {q:`${t} is completely unpredictable.`,correct:false}
    ];
    matchA=[`${t} – structure`,` ${t} – energy`,` ${t} – reaction step`];
    matchB=[`Arrangement of particles`,`Energy change`,`Part of the reaction`];
    pairs=[0,1,2];
  } else if(subject==="physics"){
    mcq=[
      {q:`${t} is best described as:`,
       options:["A physical law/process","Magic","Fiction","Undefined"],correct:0},
      {q:`Which example fits ${t}?`,
       options:["A real physical system","A fairy tale","A myth","None"],correct:0}
    ];
    tf=[
      {q:`${t} can be measured or modeled.`,correct:true},
      {q:`${t} ignores physical laws.`,correct:false}
    ];
    matchA=[`${t} – law`,` ${t} – equation`,` ${t} – mechanism`];
    matchB=[`Rule of behavior`,`Formula`,`How it acts in systems`];
    pairs=[0,1,2];
  } else if(subject==="math"){
    mcq=[
      {q:`${t} is:`,
       options:["A formal mathematical idea","Random word","Magic","Undefined"],correct:0},
      {q:`Which is a good example of ${t}?`,
       options:["A real math problem using it","A myth","A story","None"],correct:0}
    ];
    tf=[
      {q:`${t} follows strict logical rules.`,correct:true},
      {q:`${t} is arbitrary.`,correct:false}
    ];
    matchA=[`${t} – definition`,` ${t} – rule`,` ${t} – example`];
    matchB=[`Formal meaning`,`Property or theorem`,`Worked problem`];
    pairs=[0,1,2];
  } else if(subject==="history"){
    mcq=[
      {q:`${t} is:`,
       options:["A real historical event/process","Myth","Fiction","Undefined"],correct:0},
      {q:`Which chain fits ${t}?`,
       options:["Long-term causes → event → consequences","Magic","Random","None"],correct:0}
    ];
    tf=[
      {q:`${t} had real consequences.`,correct:true},
      {q:`${t} is isolated from other events.`,correct:false}
    ];
    matchA=[`${t} – cause`,` ${t} – event`,` ${t} – consequence`];
    matchB=[`Why it happened`,`What happened`,`What resulted`];
    pairs=[0,1,2];
  } else if(subject==="literature"){
    mcq=[
      {q:`${t} is part of:`,
       options:["Literary structure/meaning","Random noise","Magic","Undefined"],correct:0},
      {q:`Which example fits ${t}?`,
       options:["A real book/poem using it","A myth","A random story","None"],correct:0}
    ];
    tf=[
      {q:`${t} supports deeper meaning in a text.`,correct:true},
      {q:`${t} is purely decorative with no meaning.`,correct:false}
    ];
    matchA=[`${t} – theme`,` ${t} – symbol`,` ${t} – character role`];
    matchB=[`Central idea`,`Object/image with meaning`,`Function in the story`];
    pairs=[0,1,2];
  } else if(subject==="psychology"){
    mcq=[
      {q:`${t} describes:`,
       options:["A mental/behavioral process","Magic","Randomness","Undefined"],correct:0},
      {q:`Which example fits ${t}?`,
       options:["A real behavior or mental state","A myth","A fairy tale","None"],correct:0}
    ];
    tf=[
      {q:`${t} can be studied scientifically.`,correct:true},
      {q:`${t} has no structure.`,correct:false}
    ];
    matchA=[`${t} – cognition`,` ${t} – emotion`,` ${t} – behavior`];
    matchB=[`Thinking part`,`Feeling part`,`Action part`];
    pairs=[0,1,2];
  } else {
    mcq=[
      {q:`${t} is best seen as:`,
       options:["A real concept with structure","Random word","Magic","Undefined"],correct:0},
      {q:`Which example fits ${t}?`,
       options:["A real situation using it","A myth","A story","None"],correct:0}
    ];
    tf=[
      {q:`${t} can be broken into parts and mechanisms.`,correct:true},
      {q:`${t} has no structure at all.`,correct:false}
    ];
    matchA=[`${t} – parts`,` ${t} – mechanism`,` ${t} – example`];
    matchB=[`Components`,`How it works`,`Real case`];
    pairs=[0,1,2];
  }

  currentQuiz={mcq,tf,matchA,matchB,pairs};
  renderQuiz();
  result.textContent="Quiz generated!";
}
function renderQuiz(){
  const out=document.getElementById("quizList");
  out.innerHTML="";
  currentQuiz.mcq.forEach((qObj,qi)=>{
    let html=`<div class="item-row"><b>Q: ${qObj.q}</b><br>`;
    qObj.options.forEach((opt,oi)=>{
      html+=`<span class="quiz-answer" onclick="checkMCQ(${qi},${oi},this)">${opt}</span>`;
    });
    html+="</div>";
    out.innerHTML+=html;
  });
  currentQuiz.tf.forEach((qObj,qi)=>{
    let html=`<div class="item-row"><b>Q: ${qObj.q}</b><br>`;
    html+=`<span class="quiz-answer" onclick="checkTF(${qi},true,this)">True</span>`;
    html+=`<span class="quiz-answer" onclick="checkTF(${qi},false,this)">False</span>`;
    html+="</div>";
    out.innerHTML+=html;
  });
  let html=`<div class="item-row"><b>Match the items:</b><div class="match-container"><div class="match-column"><b>Pile A</b>`;
  currentQuiz.matchA.forEach((item,i)=>{
    html+=`<div class="match-item" onclick="selectMatch('a',${i},this)" data-index="${i}">${item}</div>`;
  });
  html+=`</div><div class="match-column"><b>Pile B</b>`;
  currentQuiz.matchB.forEach((item,i)=>{
    html+=`<div class="match-item" onclick="selectMatch('b',${i},this)" data-index="${i}">${item}</div>`;
  });
  html+="</div></div></div>";
  out.innerHTML+=html;
  matchSelection={a:null,b:null};
}
function checkMCQ(qIndex,optIndex,el){
  const q=currentQuiz.mcq[qIndex];
  const correct=(optIndex===q.correct);
  const parent=el.parentElement;
  parent.querySelectorAll('.quiz-answer').forEach(a=>a.classList.remove('correct','wrong'));
  el.classList.add(correct?'correct':'wrong');
}
function checkTF(qIndex,answer,el){
  const q=currentQuiz.tf[qIndex];
  const correct=(answer===q.correct);
  const parent=el.parentElement;
  parent.querySelectorAll('.quiz-answer').forEach(a=>a.classList.remove('correct','wrong'));
  el.classList.add(correct?'correct':'wrong');
}
function selectMatch(side,index,el){
  if(el.classList.contains('matched'))return;
  const container=el.parentElement;
  container.querySelectorAll('.match-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  matchSelection[side]={index,el};
  if(matchSelection.a&&matchSelection.b){
    const aIndex=matchSelection.a.index;
    const bIndex=matchSelection.b.index;
    const correctPairIndex=currentQuiz.pairs[aIndex];
    if(bIndex===correctPairIndex){
      matchSelection.a.el.classList.remove('selected');
      matchSelection.b.el.classList.remove('selected');
      matchSelection.a.el.classList.add('matched');
      matchSelection.b.el.classList.add('matched');
    }else{
      matchSelection.a.el.classList.add('wrong');
      matchSelection.b.el.classList.add('wrong');
      setTimeout(()=>{
        matchSelection.a.el.classList.remove('selected','wrong');
        matchSelection.b.el.classList.remove('selected','wrong');
      },500);
    }
    matchSelection={a:null,b:null};
  }
}

/* FLASHCARDS */
let cards=[];
function addCard(){
  const f=document.getElementById("flashF").value.trim();
  const b=document.getElementById("flashB").value.trim();
  if(!f||!b)return;
  cards.push({f,b});
  renderCards();
}
function renderCards(){
  const flashList=document.getElementById("flashList");
  flashList.innerHTML="";
  cards.forEach((x,i)=>{
    flashList.innerHTML+=`<div class="item-row" onclick="flip(${i})" id="c${i}" data-side="f"><b>${x.f}</b></div>`;
  });
}
function flip(i){
  const el=document.getElementById("c"+i);
  const x=cards[i];
  if(el.dataset.side==="f"){el.innerHTML="<b>"+x.b+"</b>";el.dataset.side="b";}
  else{el.innerHTML="<b>"+x.f+"</b>";el.dataset.side="f";}
}
function saveFlashcards(){localStorage.setItem("ks_flashcards",JSON.stringify(cards));}
function deleteFlashcards(){
  if(!confirm("Delete all flashcards?"))return;
  cards=[];
  localStorage.removeItem("ks_flashcards");
  renderCards();
}
function loadFlashcards(){
  const raw=localStorage.getItem("ks_flashcards");
  cards=raw?JSON.parse(raw):[];
  renderCards();
}

/* NOTEBOOK + HIGHLIGHTER */
let pages=[],currentPage=0;
function loadNotebook(){
  const saved=localStorage.getItem("KS_Notebook_Pages");
  pages=saved?JSON.parse(saved):[""];
  renderPages();
  loadPage(0);
}
function savePages(){localStorage.setItem("KS_Notebook_Pages",JSON.stringify(pages));}
function loadPage(i){
  currentPage=i;
  document.getElementById("note").innerHTML=pages[i];
  updateActiveButton();
}
function saveCurrentPage(){
  pages[currentPage]=document.getElementById("note").innerHTML;
  savePages();
}
function addPage(){
  pages.push("");
  savePages();
  renderPages();
  loadPage(pages.length-1);
}
function renderPages(){
  const container=document.getElementById("pageButtons");
  container.innerHTML="";
  pages.forEach((_,i)=>{
    container.innerHTML+=`<button class="page-btn" onclick="loadPage(${i})">Page ${i+1}</button>`;
  });
}
function updateActiveButton(){
  const buttons=document.querySelectorAll(".page-btn");
  buttons.forEach((btn,i)=>btn.classList.toggle('active',i===currentPage));
}
function highlight(color){
  let sel=window.getSelection();
  if(!sel.rangeCount)return;
  let range=sel.getRangeAt(0);
  let span=document.createElement("span");
  span.style.backgroundColor=(color==="clear")?"transparent":color;
  range.surroundContents(span);
  saveCurrentPage();
}

/* INIT */
window.onload=function(){
  loadFlashcards();
  loadTeacher();
  loadNotebook();
};
</script>

</div>

<div class="desk"></div>

<div class="notes">
  <div class="note" onclick="openSection('quizSection')">Quiz</div>
  <div class="note" onclick="openSection('flashSection')">Flashcards</div>
  <div class="note" onclick="openSection('teacherSection')">Teacher</div>
  <div class="note" onclick="openSection('notebookSection')">Notebook</div>
</div>

<div class="section" id="quizSection">
  <div class="close-btn" onclick="closeSection('quizSection')">✖</div>
  <h2>Deep Subject-Aware Quiz</h2>
  <input id="quizTopic" placeholder="Type any topic (photosynthesis, fractions, World War II, etc.)">
  <button onclick="generateQuiz()">Generate Quiz</button>
  <div id="quizList"></div>
  <div id="quizResult" style="margin-top:8px;"></div>
</div>

<div class="section" id="flashSection">
  <div class="close-btn" onclick="closeSection('flashSection')">✖</div>
  <h2>Flashcards</h2>
  <input id="flashF" placeholder="Front">
  <input id="flashB" placeholder="Back">
  <button onclick="addCard()">Add</button>
  <button onclick="saveFlashcards()">Save</button>
  <button onclick="deleteFlashcards()">Delete</button>
  <div id="flashList"></div>
</div>

<div class="section" id="teacherSection">
  <div class="close-btn" onclick="closeSection('teacherSection')">✖</div>
  <h2>Deep Teacher</h2>
  <input id="teacherQuestion" placeholder="Type any concept you want explained">
  <button onclick="teacherExplain()">Explain</button>
  <button onclick="saveTeacher()">Save Explanation</button>
  <button onclick="deleteTeacher()">Delete Explanation</button>
  <p id="teacherOut" style="white-space:pre-wrap;margin-top:12px;"></p>
</div>

<div class="section" id="notebookSection">
  <div class="close-btn" onclick="closeSection('notebookSection')">✖</div>
  <h2>Notebook</h2>
  <div id="pageButtons" style="margin-bottom:10px;"></div>
  <div class="tools">
    <button class="hl-btn" style="background:#f7d96f" onclick="highlight('#f7d96f')">Yellow</button>
    <button class="hl-btn" style="background:#f7a6c7" onclick="highlight('#f7a6c7')">Pink</button>
    <button class="hl-btn" style="background:#9adf9a" onclick="highlight('#9adf9a')">Green</button>
    <button class="hl-btn" style="background:#9ac7df" onclick="highlight('#9ac7df')">Blue</button>
    <button class="hl-btn" style="background:#b0a8a8" onclick="highlight('clear')">Clear</button>
  </div>
  <div class="notebook">
    <div id="note" contenteditable="true" oninput="saveCurrentPage()"></div>
  </div>
  <div style="text-align:center;margin-top:10px;">
    <button class="page-btn" onclick="addPage()">➕ Add Page</button>
  </div>
</div>
</body>
</html>
