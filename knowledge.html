/* Topic analysis + simple subject classification */
function analyzeTopic(raw){
  const topic = raw.trim();
  const lower = topic.toLowerCase();
  const words = lower.split(/\s+/).filter(w=>w.length>2);
  const main = words[words.length-1] || topic;

  const bio = ["cell","organism","photosynthesis","dna","rna","protein","enzyme","plant","animal","bacteria","virus","ecosystem","evolution","genetics"];
  const chem = ["molecule","reaction","acid","base","atom","bond","compound","solution","chemical","periodic","element"];
  const phys = ["force","energy","gravity","motion","velocity","acceleration","mass","light","electric","magnetic","quantum"];
  const math = ["theorem","equation","algebra","geometry","calculus","integral","derivative","matrix","probability","statistics","triangle","function"];
  const hist = ["war","revolution","empire","kingdom","treaty","independence","civil","ancient","medieval","modern","cold war","world war","wwi","wwii"];
  const econ = ["market","inflation","demand","supply","price","cost","profit","capital","trade","economy","recession","growth"];
  const lit = ["novel","poem","poetry","play","shakespeare","metaphor","symbolism","character","plot","narrative","drama"];
  const psych = ["behavior","cognition","memory","emotion","motivation","personality","therapy","mental","perception","learning"];
  const cs = ["algorithm","data","programming","computer","software","hardware","network","database","ai","machine learning","code"];
  const pol = ["democracy","constitution","rights","law","government","election","policy","state","power","justice"];
  const geo = ["continent","climate","river","mountain","ocean","country","city","tectonic","plate","earthquake","volcano"];
  const phil = ["ethics","logic","metaphysics","epistemology","morality","existence","truth","reason"];
  const astro = ["star","planet","galaxy","universe","cosmos","orbit","telescope","black hole","nebula"];
  const med = ["disease","anatomy","treatment","therapy","diagnosis","symptom","infection","immune","surgery"];

  function hasAny(list){return list.some(k=>lower.includes(k));}

  let subject = "general";
  if(hasAny(bio)) subject="biology";
  else if(hasAny(chem)) subject="chemistry";
  else if(hasAny(phys)) subject="physics";
  else if(hasAny(math)) subject="mathematics";
  else if(hasAny(hist)) subject="history";
  else if(hasAny(econ)) subject="economics";
  else if(hasAny(lit)) subject="literature";
  else if(hasAny(psych)) subject="psychology";
  else if(hasAny(cs)) subject="computer science";
  else if(hasAny(pol)) subject="political science";
  else if(hasAny(geo)) subject="geography";
  else if(hasAny(phil)) subject="philosophy";
  else if(hasAny(astro)) subject="astronomy";
  else if(hasAny(med)) subject="medicine";

  return {topic, lower, words, main, subject};
}

/* QUIZ – deeper, topic-aware (rule-based) */
let currentQuiz={mcq:[],tf:[],matchA:[],matchB:[],pairs:[]},matchSelection={a:null,b:null};

function generateQuiz(){
  const t=document.getElementById("quizTopic").value.trim();
  const out=document.getElementById("quizList");
  const result=document.getElementById("quizResult");
  if(!t){out.innerHTML="";result.textContent="Type a topic first.";return;}

  const info=analyzeTopic(t);
  const topic=info.topic;
  const main=info.main;
  const subject=info.subject;

  let mcq=[], tf=[], matchA=[], matchB=[];

  if(subject==="biology"){
    mcq=[
      {
        q:`Which statement best describes ${topic}?`,
        options:[
          `${topic} is a biological concept that involves ${main} and helps explain how living systems work.`,
          `${topic} is a random idea with no connection to biology.`,
          `${topic} is only used in jokes about science.`,
          `${topic} cannot be studied or observed in real organisms.`
        ],
        correct:0
      },
      {
        q:`Where would you most likely encounter ${topic}?`,
        options:[
          `In biology classes, research about living organisms, or discussions of how ${main} affects life.`,
          `Only in fantasy stories with magical creatures.`,
          `Only in ancient myths with no scientific basis.`,
          `Never, because ${topic} is not a real biological idea.`
        ],
        correct:0
      },
      {
        q:`Which question helps you understand ${topic} more deeply?`,
        options:[
          `“How does ${topic} change when conditions around ${main} change?”`,
          `“Can I ignore ${topic} completely?”`,
          `“Is ${topic} just a random word?”`,
          `“Should I avoid learning about ${topic}?”`
        ],
        correct:0
      }
    ];
    tf=[
      {q:`${topic} is related to living organisms or their processes.`,correct:true},
      {q:`${topic} has no connection to real biological systems.`,correct:false},
      {q:`Understanding ${topic} can help explain how ${main} affects life.`,correct:true}
    ];
    matchA=[
      `${topic} – definition`,
      `${topic} – biological level`,
      `${topic} – example`,
      `${topic} – key process`
    ];
    matchB=[
      `What ${topic} means in biology and how it relates to ${main}.`,
      `Whether ${topic} happens at the cellular, organism, or ecosystem level.`,
      `A real situation where ${topic} appears in living organisms.`,
      `The main process or mechanism that ${topic} describes.`
    ];
  } else if(subject==="history"){
    mcq=[
      {
        q:`What kind of historical idea is ${topic}?`,
        options:[
          `${topic} is a historical event or concept that involves ${main} and shapes how we understand the past.`,
          `${topic} is a random story with no historical importance.`,
          `${topic} is only a rumor with no records.`,
          `${topic} cannot be studied using historical sources.`
        ],
        correct:0
      },
      {
        q:`Where does ${topic} usually appear in history?`,
        options:[
          `In discussions of time periods, conflicts, or changes involving ${main}.`,
          `Only in fictional novels with no real basis.`,
          `Only in legends that historians ignore.`,
          `It never appears in serious historical study.`
        ],
        correct:0
      },
      {
        q:`Which question helps you analyze ${topic}?`,
        options:[
          `“What caused ${topic}, and what were its consequences?”`,
          `“Can I ignore all sources about ${topic}?”`,
          `“Is ${topic} just a random date?”`,
          `“Should I avoid reading about ${topic}?”`
        ],
        correct:0
      }
    ];
    tf=[
      {q:`${topic} is connected to real people, places, or events.`,correct:true},
      {q:`${topic} has no impact on how societies changed over time.`,correct:false},
      {q:`Studying ${topic} can help explain how ${main} influenced history.`,correct:true}
    ];
    matchA=[
      `${topic} – time period`,
      `${topic} – cause`,
      `${topic} – consequence`,
      `${topic} – key figure`
    ];
    matchB=[
      `When ${topic} happened or was most important.`,
      `What led to ${topic} and made it possible.`,
      `What changed because ${topic} happened.`,
      `A person or group strongly connected to ${topic}.`
    ];
  } else if(subject==="mathematics"){
    mcq=[
      {
        q:`What kind of mathematical idea is ${topic}?`,
        options:[
          `${topic} is a mathematical concept or tool that involves ${main} and helps solve problems.`,
          `${topic} is a random number with no meaning.`,
          `${topic} is only used in jokes about math.`,
          `${topic} cannot be written or reasoned about formally.`
        ],
        correct:0
      },
      {
        q:`Where would you most likely use ${topic}?`,
        options:[
          `When solving problems, proving results, or analyzing patterns involving ${main}.`,
          `Only when telling funny stories about numbers.`,
          `Only in games with no rules.`,
          `Never, because ${topic} is not part of mathematics.`
        ],
        correct:0
      },
      {
        q:`Which question helps you understand ${topic}?`,
        options:[
          `“What does ${topic} assume, and what does it let me calculate or prove?”`,
          `“Can I ignore all rules about ${topic}?”`,
          `“Is ${topic} just a random symbol?”`,
          `“Should I avoid using ${topic} in problems?”`
        ],
        correct:0
      }
    ];
    tf=[
      {q:`${topic} follows clear rules or definitions.`,correct:true},
      {q:`${topic} has no structure and cannot be explained.`,correct:false},
      {q:`Understanding ${topic} can help solve problems involving ${main}.`,correct:true}
    ];
    matchA=[
      `${topic} – definition`,
      `${topic} – type of math`,
      `${topic} – example problem`,
      `${topic} – key formula or idea`
    ];
    matchB=[
      `What ${topic} means and how it is defined.`,
      `Whether ${topic} belongs to algebra, geometry, calculus, etc.`,
      `A problem where ${topic} is used to find an answer.`,
      `The main formula or reasoning pattern behind ${topic}.`
    ];
  } else {
    // general subject fallback
    mcq=[
      {
        q:`Which statement best describes ${topic}?`,
        options:[
          `${topic} is an idea that focuses on ${main} and helps explain or organize something in its field.`,
          `${topic} is random and has no structure or meaning.`,
          `${topic} is only used in jokes.`,
          `${topic} cannot be studied or understood.`
        ],
        correct:0
      },
      {
        q:`Where does ${topic} usually appear?`,
        options:[
          `In real situations, discussions, or studies involving ${main}.`,
          `Only in fictional stories.`,
          `Only in ancient myths.`,
          `It never appears anywhere.`
        ],
        correct:0
      },
      {
        q:`What is a good way to explore ${topic}?`,
        options:[
          `“Break ${topic} into smaller parts: causes, effects, examples, and rules.”`,
          `“Ignore ${topic} completely.”`,
          `“Treat ${topic} as a random word.”`,
          `“Avoid asking questions about ${topic}.”`
        ],
        correct:0
      }
    ];
    tf=[
      {q:`${topic} has real applications or meaning in some field.`,correct:true},
      {q:`${topic} cannot be explained or used in any way.`,correct:false},
      {q:`Understanding ${topic} can help you think more clearly about ${main}.`,correct:true}
    ];
    matchA=[
      `${topic} – definition`,
      `${topic} – example`,
      `${topic} – key idea`,
      `${topic} – related concept`
    ];
    matchB=[
      `What ${topic} means and how it relates to ${main}.`,
      `A situation where ${topic} appears in real life.`,
      `The most important thing ${topic} helps you understand.`,
      `Another idea that often appears together with ${topic}.`
    ];
  }

  currentQuiz={mcq,tf,matchA,matchB,pairs:[0,1,2,3]};
  renderQuiz();
  result.textContent=`Quiz generated for subject: ${subject}.`;
}

function renderQuiz(){
  const out=document.getElementById("quizList");
  out.innerHTML="";
  currentQuiz.mcq.forEach((qObj,qi)=>{
    let html=`<div class="item-row"><b>Q: ${qObj.q}</b><br>`;
    qObj.options.forEach((opt,oi)=>{
      html+=`<span class="quiz-answer" onclick="checkMCQ(${qi},${oi},this)">${opt}</span>`;
    });
    html+="</div>";
    out.innerHTML+=html;
  });
  currentQuiz.tf.forEach((qObj,qi)=>{
    let html=`<div class="item-row"><b>Q: ${qObj.q}</b><br>`;
    html+=`<span class="quiz-answer" onclick="checkTF(${qi},true,this)">True</span>`;
    html+=`<span class="quiz-answer" onclick="checkTF(${qi},false,this)">False</span>`;
    html+="</div>";
    out.innerHTML+=html;
  });
  let html=`<div class="item-row"><b>Match the items:</b><div class="match-container"><div class="match-column"><b>Pile A</b>`;
  currentQuiz.matchA.forEach((item,i)=>{
    html+=`<div class="match-item" onclick="selectMatch('a',${i},this)" data-index="${i}">${item}</div>`;
  });
  html+=`</div><div class="match-column"><b>Pile B</b>`;
  currentQuiz.matchB.forEach((item,i)=>{
    html+=`<div class="match-item" onclick="selectMatch('b',${i},this)" data-index="${i}">${item}</div>`;
  });
  html+="</div></div></div>";
  out.innerHTML+=html;
  matchSelection={a:null,b:null};
}

function checkMCQ(qIndex,optIndex,el){
  const q=currentQuiz.mcq[qIndex];
  const correct=(optIndex===q.correct);
  const parent=el.parentElement;
  parent.querySelectorAll('.quiz-answer').forEach(a=>a.classList.remove('correct','wrong'));
  el.classList.add(correct?'correct':'wrong');
}
function checkTF(qIndex,answer,el){
  const q=currentQuiz.tf[qIndex];
  const correct=(answer===q.correct);
  const parent=el.parentElement;
  parent.querySelectorAll('.quiz-answer').forEach(a=>a.classList.remove('correct','wrong'));
  el.classList.add(correct?'correct':'wrong');
}
function selectMatch(side,index,el){
  if(el.classList.contains('matched'))return;
  const container=el.parentElement;
  container.querySelectorAll('.match-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  matchSelection[side]={index,el};
  if(matchSelection.a&&matchSelection.b){
    const aIndex=matchSelection.a.index;
    const bIndex=matchSelection.b.index;
    const correctPairIndex=currentQuiz.pairs[aIndex];
    if(bIndex===correctPairIndex){
      matchSelection.a.el.classList.remove('selected');
      matchSelection.b.el.classList.remove('selected');
      matchSelection.a.el.classList.add('matched');
      matchSelection.b.el.classList.add('matched');
    }else{
      matchSelection.a.el.classList.add('wrong');
      matchSelection.b.el.classList.add('wrong');
      setTimeout(()=>{
        matchSelection.a.el.classList.remove('selected','wrong');
        matchSelection.b.el.classList.remove('selected','wrong');
      },600);
    }
    matchSelection={a:null,b:null};
  }
}

/* FLASHCARDS */
let cards=[];
function addCard(){
  const f=document.getElementById("flashF").value.trim();
  const b=document.getElementById("flashB").value.trim();
  if(!f||!b)return;
  cards.push({f,b});
  renderCards();
}
function renderCards(){
  const flashList=document.getElementById("flashList");
  flashList.innerHTML="";
  cards.forEach((x,i)=>{
    flashList.innerHTML+=`<div class="item-row" onclick="flip(${i})" id="c${i}" data-side="f"><b>${x.f}</b></div>`;
  });
}
function flip(i){
  const el=document.getElementById("c"+i);
  const x=cards[i];
  if(el.dataset.side==="f"){el.innerHTML="<b>"+x.b+"</b>";el.dataset.side="b";}
  else{el.innerHTML="<b>"+x.f+"</b>";el.dataset.side="f";}
}
function saveFlashcards(){localStorage.setItem("ks_flashcards",JSON.stringify(cards));}
function deleteFlashcards(){
  if(!confirm("Delete all flashcards?"))return;
  cards=[];
  localStorage.removeItem("ks_flashcards");
  renderCards();
}
function loadFlashcards(){
  const raw=localStorage.getItem("ks_flashcards");
  cards=raw?JSON.parse(raw):[];
  renderCards();
}

/* TEACHER – deep, mixed-style explanation */
function teacherExplain(){
  const t=document.getElementById("teacherQuestion").value.trim();
  const out=document.getElementById("teacherOut");
  if(!t){out.textContent="Type a topic.";return;}

  const info=analyzeTopic(t);
  const topic=info.topic;
  const main=info.main;
  const subject=info.subject;

  let intro = `Let’s talk about ${topic}. This is an idea that centers around ${main}, and it shows up in the subject of ${subject}. We’ll start with a friendly overview, then go deeper into how it really works.\n\n`;

  let body = "";

  if(subject==="biology"){
    body +=
      `1. What it means (biology focus):\n}
