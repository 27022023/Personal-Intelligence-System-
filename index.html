<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personal Intelligence System</title>

<style>

    body {
        margin: 0;
        background: #07152b; /* richer navy */
        font-family: "Segoe UI", sans-serif;
        overflow-x: hidden;
    }

    /* Title */
    .title {
        text-align: center;
        margin-top: 40px;
        font-size: 80px;
        font-family: "Lucida Calligraphy", "Brush Script MT", cursive;
        color: #7dd6ff;
        text-shadow: 0 0 20px #7dd6ff;
    }

    /* Robot area */
    .robot-area {
        margin-top: 80px; /* moved down */
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Robot body */
    .robot {
        width: 180px;
        height: 240px;
        background: #cce7ff;
        border-radius: 25px;
        position: relative;
        box-shadow: 0 0 15px #7dd6ff;
    }

    /* Robot head */
    .robot-head {
        width: 150px;
        height: 110px;
        background: #e0f7ff;
        border-radius: 25px;
        position: absolute;
        top: -100px;
        left: 15px;
        box-shadow: 0 0 15px #7dd6ff;
    }

    /* Eyes */
    .eye {
        width: 30px;
        height: 30px;
        background: #7dd6ff;
        border-radius: 50%;
        position: absolute;
        top: 35px;
        animation: blink 3s infinite;
    }

    .eye.left { left: 25px; }
    .eye.right { right: 25px; }

    @keyframes blink {
        0%, 90%, 100% { height: 30px; }
        95% { height: 4px; }
    }

    /* Screwdriver hand */
    .hand {
        width: 20px;
        height: 90px;
        background: #b0d9ff;
        position: absolute;
        right: -30px;
        top: 70px;
        border-radius: 12px;
        transform-origin: top;
        animation: fix 1.5s infinite alternate;
    }

    @keyframes fix {
        from { transform: rotate(15deg); }
        to { transform: rotate(-25deg); }
    }

    /* Gears */
    .gears {
        margin-top: 40px;
        font-size: 70px;
        color: #7dd6ff;
        animation: spin 3s linear infinite;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* Speech bubble */
    .bubble {
        margin-top: 40px;
        background: #07152b;
        border: 3px solid #7dd6ff;
        color: white;
        padding: 30px;
        width: 420px;
        border-radius: 25px;
        font-size: 24px;
        text-align: center;
        box-shadow: 0 0 15px #7dd6ff;
    }

    /* Menu button */
    .menu-btn {
        position: fixed;
        top: 25px;
        right: 25px;
        background: #7dd6ff;
        color: #07152b;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 26px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 20px #7dd6ff;
        transition: 0.3s;
        z-index: 1000;
    }

    .menu-btn:hover {
        transform: scale(1.1);
    }

    /* Menu panel */
    .menu-panel {
        position: fixed;
        top: 0;
        right: -350px;
        width: 350px;
        height: 100%;
        background: #11264d;
        box-shadow: -5px 0 15px #000;
        padding: 50px 30px;
        transition: 0.4s;
        color: white;
        font-size: 24px;
        z-index: 999;
    }

    .menu-panel a {
        display: block;
        margin: 30px 0;
        color: #7dd6ff;
        text-decoration: none;
        font-size: 26px;
    }

</style>
</head>

<body>

<div class="title">Personal Intelligence System</div>

<div class="robot-area">

    <div class="robot">
        <div class="robot-head">
            <div class="eye left"></div>
            <div class="eye right"></div>
        </div>
        <div class="hand"></div>
    </div>

    <div class="gears">⚙️⚙️⚙️</div>

    <div class="bubble">
        Hello!! My name is Luna!!<br>
        Let's chat, work or study together!! ✨💜
    </div>

</div>

<div class="menu-btn" onclick="toggleMenu()">Menu</div>

<div class="menu-panel" id="menuPanel">
    <a href="knowledge.html">Knowledge Studio 📖</a>
    <a href="luna.html">Luna AI Assistant 🤖</a>
    <a href="mind.html">Mind Atlas 🗺️</a>
    <a href="life.html">Life Console 💚</a>
    <a href="community.html">Community Insights 👫🏻</a>
</div>

<script>
let menuOpen = false;

function toggleMenu() {
    const panel = document.getElementById("menuPanel");

    if (!menuOpen) {
        panel.style.right = "0";
        menuOpen = true;
    } else {
        panel.style.right = "-350px";
        menuOpen = false;
    }
}
</script>

</body>
</html>
