<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Intelligence System</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #050b1a;
      color: #a8d8ff;
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 20px;
    }

    .container {
      text-align: center;
      position: relative;
      transform: scale(1.3);
    }

    .title {
      font-family: "Lucida Calligraphy", "Brush Script MT", cursive;
      font-size: 2.8rem;
      margin-bottom: 20px;
      padding: 0 10px;
      text-shadow: 0 0 15px #4fc3f7;
    }

    /* ROBOT — SAME STYLE AS FIRST VERSION */
    .robot {
      width: 200px;
      height: 260px;
      background: #e0f7fa;
      border-radius: 30px;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 0 15px rgba(79,195,247,0.6);
      animation: float 3s ease-in-out infinite;
      margin-top: 30px; /* moved DOWN so it doesn't cover title */
    }

    .robot::before {
      content: "";
      position: absolute;
      top: -60px; /* moved UP slightly */
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 100px;
      background: #b2ebf2;
      border-radius: 25px;
    }

    .eye {
      position: absolute;
      top: -25px;
      width: 18px;
      height: 18px;
      background: #004d40;
      border-radius: 50%;
    }
    .eye.left { left: 35px; }
    .eye.right { right: 35px; }

    .smile {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 20px;
      border-bottom: 4px solid #004d40;
      border-radius: 0 0 50px 50px;
    }

    .screwdriver {
      position: absolute;
      bottom: 10px;
      right: -40px;
      width: 15px;
      height: 70px;
      background: #ffab40;
      border-radius: 10px;
      animation: fix 1.5s ease-in-out infinite;
    }

    .screwdriver::after {
      content: "";
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 15px;
      background: #b0bec5;
      border-radius: 5px;
    }

    .gear {
      font-size: 2.2rem;
      color: #a8d8ff;
      position: absolute;
      animation: spin 4s linear infinite;
    }
    .gear.one { bottom: -10px; left: -50px; }
    .gear.two { bottom: 35px; left: -90px; animation-duration: 6s; }
    .gear.three { bottom: 80px; left: -50px; animation-duration: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fix {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-25deg); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* BUBBLE — MOVED CLOSER */
    .bubble {
      position: absolute;
      top: -10px;
      right: -200px; /* MUCH closer */
      width: 200px;
      background: #050b1a;
      border-radius: 15px;
      border: 2px solid #a8d8ff;
      padding: 12px;
      font-size: 0.85rem;
    }

    .bubble::after {
      content: "";
      position: absolute;
      left: -12px;
      top: 35px;
      border-width: 12px;
      border-style: solid;
      border-color: transparent #050b1a transparent transparent;
    }

    /* MENU — MOVED CLOSER + SMALLER */
    .menu-button {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid #a8d8ff;
      color: #a8d8ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .menu-panel {
      position: fixed;
      top: 90px;
      right: 10px;
      background: #050b1a;
      border: 2px solid #a8d8ff;
      border-radius: 12px;
      padding: 10px;
      display: none;
    }

    .menu-link {
      display: block;
      margin: 8px 0;
      color: #a8d8ff;
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="menu-button" onclick="toggleMenu()">Menu</div>

  <div class="menu-panel" id="menu">
    <a class="menu-link" href="knowledge.html">📖 Knowledge Studio</a>
    <a class="menu-link" href="luna.html">🤖 Luna AI Assistant</a>
    <a class="menu-link" href="mind.html">🗺️ Mind Atlas</a>
    <a class="menu-link" href="life.html">💚 Life Console</a>
    <a class="menu-link" href="community.html">👫🏻 Community Insights</a>
  </div>

  <div class="container">
    <div class="title">Personal Intelligence System</div>

    <div class="scene">
      <div class="robot">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>

        <div class="screwdriver"></div>

        <div class="gear one">⚙️</div>
        <div class="gear two">⚙️</div>
        <div class="gear three">⚙️</div>
      </div>

      <div class="bubble">
        Hello!! My name is Luna!!<br>
        Let’s chat, work or study together!! ✨💜
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }
  </script>

</body>
</html>
