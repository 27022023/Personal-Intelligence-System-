<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Intelligence System</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #050b1a; 
      color: #a8d8ff;
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* move content DOWN so title is visible */
      padding-top: 20px; /* spacing for phone screens */
    }

    .container {
      text-align: center;
      position: relative;
      transform: scale(1.2); /* smaller scale for phones */
    }

    .title {
      font-family: "Lucida Calligraphy", "Brush Script MT", cursive;
      font-size: 2.4rem; /* smaller for phones */
      color: #a8d8ff;
      text-shadow: 0 0 15px #4fc3f7;
      margin-bottom: 10px;
      padding: 0 10px;
    }

    /* ROBOT */
    .robot {
      width: 180px;
      height: 230px;
      background: #e0f7fa;
      border-radius: 35px;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 0 20px rgba(79,195,247,0.6);
      animation: float 3s ease-in-out infinite;
      margin-top: 20px; /* move robot DOWN */
    }

    /* ROBOT HEAD */
    .robot::before {
      content: "";
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 90px;
      background: #b2ebf2;
      border-radius: 25px;
      box-shadow: 0 0 15px rgba(79,195,247,0.6);
    }

    /* EYES */
    .eye {
      position: absolute;
      top: -30px;
      width: 20px;
      height: 20px;
      background: #004d40;
      border-radius: 50%;
      box-shadow: 0 0 10px #00e5ff;
    }
    .eye.left { left: 35px; }
    .eye.right { right: 35px; }

    /* SMILE */
    .smile {
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 55px;
      height: 25px;
      border-bottom: 5px solid #004d40;
      border-radius: 0 0 50px 50px;
    }

    /* SCREWDRIVER */
    .screwdriver {
      position: absolute;
      bottom: 10px;
      right: -40px;
      width: 18px;
      height: 80px;
      background: #ffab40;
      border-radius: 10px;
      transform-origin: top;
      animation: fix 1.5s ease-in-out infinite;
    }
    .screwdriver::after {
      content: "";
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 35px;
      height: 18px;
      background: #b0bec5;
      border-radius: 5px;
    }

    /* GEARS */
    .gear {
      font-size: 2.4rem;
      color: #a8d8ff;
      position: absolute;
      animation: spin 4s linear infinite;
    }
    .gear.one { bottom: -10px; left: -55px; }
    .gear.two { bottom: 35px; left: -95px; animation-duration: 6s; }
    .gear.three { bottom: 85px; left: -55px; animation-duration: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fix {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-25deg); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* SPEECH BUBBLE — CLOSER FOR PHONE */
    .bubble {
      position: absolute;
      top: -20px;
      right: -220px; /* MUCH closer */
      width: 220px;
      background: #050b1a;
      border-radius: 15px;
      border: 2px solid #a8d8ff;
      padding: 15px;
      color: #ffffff;
      font-size: 0.9rem;
      box-shadow: 0 0 15px rgba(168,216,255,0.5);
    }

    .bubble::after {
      content: "";
      position: absolute;
      left: -15px;
      top: 40px;
      border-width: 15px;
      border-style: solid;
      border-color: transparent #050b1a transparent transparent;
    }

    /* MENU BUTTON — CLOSER + SMALLER FOR PHONE */
    .menu-button {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #a8d8ff;
      color: #a8d8ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      background: rgba(5,11,26,0.8);
      box-shadow: 0 0 15px rgba(168,216,255,0.6);
    }

    .menu-panel {
      position: fixed;
      top: 100px;
      right: 10px;
      background: #050b1a;
      border: 2px solid #a8d8ff;
      border-radius: 12px;
      padding: 10px 15px;
      display: none;
      box-shadow: 0 0 20px rgba(168,216,255,0.6);
    }

    .menu-link {
      display: block;
      margin: 8px 0;
      color: #a8d8ff;
      text-decoration: none;
      font-size: 1rem;
    }

    .menu-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="menu-button" onclick="toggleMenu()">Menu</div>

  <div class="menu-panel" id="menu">
    <a class="menu-link" href="knowledge.html">📖 Knowledge Studio</a>
    <a class="menu-link" href="luna.html">🤖 Luna AI Assistant</a>
    <a class="menu-link" href="mind.html">🗺️ Mind Atlas</a>
    <a class="menu-link" href="life.html">💚 Life Console</a>
    <a class="menu-link" href="community.html">👫🏻 Community Insights</a>
  </div>

  <div class="container">
    <div class="title">Personal Intelligence System</div>

    <div class="scene">
      <div class="robot">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>

        <div class="screwdriver"></div>

        <div class="gear one">⚙️</div>
        <div class="gear two">⚙️</div>
        <div class="gear three">⚙️</div>
      </div>

      <div class="bubble">
        Hello!! My name is Luna!!<br>
        Let’s chat, work or study together!! ✨💜
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }
  </script>

</body>
</html>
