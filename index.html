<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Intelligence System</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #050b1a;
      color: #a8d8ff;
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      position: relative;
      transform: scale(1.55); /* EVERYTHING BIGGER */
      margin-top: 120px; /* LOWER EVERYTHING */
    }

    .title {
      font-family: "Lucida Calligraphy", "Brush Script MT", cursive;
      font-size: 4.5rem; /* BIGGER */
      color: #a8d8ff;
      text-shadow: 0 0 15px #4fc3f7;
      margin-bottom: 50px;
    }

    /* ROBOT */
    .robot {
      width: 240px; /* BIGGER */
      height: 320px; /* BIGGER */
      background: #e0f7fa;
      border-radius: 40px;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 0 20px rgba(79,195,247,0.6);
      animation: float 3s ease-in-out infinite;
      margin-top: 80px; /* LOWER ROBOT */
    }

    .robot::before {
      content: "";
      position: absolute;
      top: -90px; /* BIGGER HEAD */
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 140px;
      background: #b2ebf2;
      border-radius: 30px;
      box-shadow: 0 0 15px rgba(79,195,247,0.6);
    }

    .eye {
      position: absolute;
      top: -45px;
      width: 28px;
      height: 28px;
      background: #004d40;
      border-radius: 50%;
      box-shadow: 0 0 10px #00e5ff;
    }
    .eye.left { left: 50px; }
    .eye.right { right: 50px; }

    .smile {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 35px;
      border-bottom: 6px solid #004d40;
      border-radius: 0 0 50px 50px;
    }

    .screwdriver {
      position: absolute;
      bottom: 25px;
      right: -60px;
      width: 25px;
      height: 110px;
      background: #ffab40;
      border-radius: 12px;
      transform-origin: top;
      animation: fix 1.5s ease-in-out infinite;
    }

    .screwdriver::after {
      content: "";
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 25px;
      background: #b0bec5;
      border-radius: 5px;
    }

    .gear {
      font-size: 3.5rem; /* BIGGER */
      color: #a8d8ff;
      position: absolute;
      animation: spin 4s linear infinite;
    }
    .gear.one { bottom: -25px; left: -90px; }
    .gear.two { bottom: 50px; left: -150px; animation-duration: 6s; }
    .gear.three { bottom: 130px; left: -90px; animation-duration: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes fix {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-30deg); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* SPEECH BUBBLE — 💭 STYLE + MORE RIGHT */
    .bubble {
      position: absolute;
      top: -20px;
      right: -420px; /* MORE TO THE RIGHT */
      width: 330px;
      background: #050b1a;
      border-radius: 25px;
      border: 2px solid #a8d8ff;
      padding: 25px;
      color: #ffffff;
      font-size: 1.3rem;
      box-shadow: 0 0 15px rgba(168,216,255,0.5);
    }

    .bubble::before {
      content: "💭"; /* BUBBLE EMOJI */
      position: absolute;
      left: -45px;
      top: 40px;
      font-size: 2.5rem;
    }

    /* MENU BUTTON — MORE RIGHT */
    .menu-button {
      position: fixed;
      top: 20px;
      right: 60px; /* MORE RIGHT */
      width: 160px; /* BIGGER */
      height: 160px; /* BIGGER */
      border-radius: 50%;
      border: 3px solid #a8d8ff;
      color: #a8d8ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      font-size: 1.5rem;
      cursor: pointer;
      background: rgba(5,11,26,0.8);
      box-shadow: 0 0 20px rgba(168,216,255,0.6);
    }

    .menu-panel {
      position: fixed;
      top: 200px;
      right: 60px; /* MATCH BUTTON */
      background: #050b1a;
      border: 2px solid #a8d8ff;
      border-radius: 15px;
      padding: 20px 25px;
      display: none;
      box-shadow: 0 0 20px rgba(168,216,255,0.6);
    }

    .menu-link {
      display: block;
      margin: 15px 0;
      color: #a8d8ff;
      text-decoration: none;
      font-size: 1.4rem;
    }

    .menu-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="menu-button" onclick="toggleMenu()">Menu</div>

  <div class="menu-panel" id="menu">
    <a class="menu-link" href="knowledge.html">📖 Knowledge Studio</a>
    <a class="menu-link" href="luna.html">🤖 Luna AI Assistant</a>
    <a class="menu-link" href="mind.html">🗺️ Mind Atlas</a>
    <a class="menu-link" href="life.html">💚 Life Console</a>
    <a class="menu-link" href="community.html">👫🏻 Community Insights</a>
  </div>

  <div class="container">
    <div class="title">Personal Intelligence System</div>

    <div class="scene">
      <div class="robot">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>

        <div class="screwdriver"></div>

        <div class="gear one">⚙️</div>
        <div class="gear two">⚙️</div>
        <div class="gear three">⚙️</div>
      </div>

      <div class="bubble">
        Hello!! My name is Luna!!<br>
        Let’s chat, work or study together!! ✨💜
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }
  </script>

</body>
</html>
