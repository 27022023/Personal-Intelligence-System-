<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Intelligence System</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #050b1a; /* rich navy */
      color: #a8d8ff;      /* glowing blue */
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      position: relative;
    }

    .title {
      font-family: "Lucida Calligraphy", "Brush Script MT", cursive;
      font-size: 3rem;
      color: #a8d8ff;
      text-shadow: 0 0 10px #4fc3f7;
      margin-bottom: 20px;
    }

    .scene {
      margin-top: 10px;
      display: inline-block;
      position: relative;
    }

    .robot {
      width: 120px;
      height: 140px;
      background: #e0f7fa;
      border-radius: 20px;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 0 15px rgba(79,195,247,0.6);
      animation: float 3s ease-in-out infinite;
    }

    .robot::before {
      content: "";
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 50px;
      background: #b2ebf2;
      border-radius: 15px;
    }

    .eye {
      position: absolute;
      top: -10px;
      width: 12px;
      height: 12px;
      background: #004d40;
      border-radius: 50%;
      box-shadow: 0 0 8px #00e5ff;
    }

    .eye.left { left: 22px; }
    .eye.right { right: 22px; }

    .screwdriver {
      position: absolute;
      bottom: 10px;
      right: -20px;
      width: 8px;
      height: 40px;
      background: #ffab40;
      border-radius: 4px;
      transform-origin: top;
      animation: fix 1.5s ease-in-out infinite;
    }

    .gear {
      font-size: 2rem;
      color: #a8d8ff;
      position: absolute;
      bottom: -10px;
      left: -40px;
      animation: spin 4s linear infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes fix {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-25deg); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .bubble {
      position: absolute;
      top: -10px;
      right: -230px;
      width: 220px;
      background: #050b1a;
      border-radius: 15px;
      border: 1px solid #a8d8ff;
      padding: 10px 15px;
      color: #ffffff;
      font-size: 0.9rem;
      box-shadow: 0 0 10px rgba(168,216,255,0.5);
    }

    .bubble::after {
      content: "";
      position: absolute;
      left: -10px;
      top: 40px;
      border-width: 10px;
      border-style: solid;
      border-color: transparent #050b1a transparent transparent;
    }

    .menu-button {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 2px solid #a8d8ff;
      color: #a8d8ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 600;
      cursor: pointer;
      background: rgba(5,11,26,0.8);
      box-shadow: 0 0 12px rgba(168,216,255,0.6);
    }

    .menu-panel {
      position: fixed;
      top: 140px;
      right: 20px;
      background: #050b1a;
      border: 1px solid #a8d8ff;
      border-radius: 12px;
      padding: 10px 15px;
      display: none;
      box-shadow: 0 0 15px rgba(168,216,255,0.6);
    }

    .menu-link {
      display: block;
      margin: 6px 0;
      color: #a8d8ff;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .menu-link span {
      margin-left: 6px;
    }

    .menu-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="menu-button" onclick="toggleMenu()">Menu</div>
  <div class="menu-panel" id="menu">
    <a class="menu-link" href="knowledge.html">📖 <span>Knowledge Studio</span></a>
    <a class="menu-link" href="luna.html">🤖 <span>Luna AI Assistant</span></a>
    <a class="menu-link" href="mind.html">🗺️ <span>Mind Atlas</span></a>
    <a class="menu-link" href="life.html">💚 <span>Life Console</span></a>
    <a class="menu-link" href="community.html">👫🏻 <span>Community Insights</span></a>
  </div>

  <div class="container">
    <div class="title">Personal Intelligence System</div>
    <div class="scene">
      <div class="robot">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="screwdriver"></div>
        <div class="gear">⚙️</div>
      </div>
      <div class="bubble">
        Hello!! My name is Luna!!<br>
        Let’s chat, work or study together!! ✨💜
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }
  </script>
</body>
</html>
