<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Intelligence System</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #050b1a; /* rich navy */
      color: #a8d8ff;      /* glowing blue */
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      position: relative;
    }

    .title {
      font-family: "Lucida Calligraphy", "Brush Script MT", cursive;
      font-size: 3rem;
      color: #a8d8ff;
      text-shadow: 0 0 10px #4fc3f7;
      margin-bottom: 20px;
    }

    .scene {
      margin-top: 10px;
      display: inline-block;
      position: relative;
    }

    .robot {
      width: 120px;
      height: 140px;
      background: #e0f7fa;
      border-radius: 20px;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 0 15px rgba(79,195,247,0.6);
      animation: float 3s ease-in-out infinite;
    }

    .robot::before {
      content: "";
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 50px;
      background: #b2ebf2;
      border-radius: 15px;
    }

    .eye {
      position: absolute;
      top: -10px;
      width: 12px;
      height: 12px;
      top: 140px;
      right: 20px;
      background: #050b1a;
      border: 1px solid #a8d8ff;
      border-radius: 12px;
      padding: 10px 15px;
      display: none;
      box-shadow: 0 0 15px rgba(168,216,255,0.6);
    }

    .menu-link {
      display: block;
      margin: 6px 0;
      color: #a8d8ff;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .menu-link span {
      margin-left: 6px;
    }

    .menu-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="menu-button" onclick="toggleMenu()">Menu</div>
  <div class="menu-panel" id="menu">
    <a class="menu-link" href="knowledge.html">📖 <span>Knowledge Studio</span></a>
    <a class="menu-link" href="luna.html">🤖 <span>Luna AI Assistant</span></a>
    <a class="menu-link" href="mind.html">🗺️ <span>Mind Atlas</span></a>
    <a class="menu-link" href="life.html">💚 <span>Life Console</span></a>
    <a class="menu-link" href="community.html">👫🏻 <span>Community Insights</span></a>
  </div>

  <div class="container">
    <div class="title">Personal Intelligence System</div>
    <div class="scene">
      <div class="robot">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="screwdriver"></div>
        <div class="gear">⚙️</div>
      </div>
      <div class="bubble">
        Hello!! My name is Luna!!<br>
        Let’s chat, work or study together!! ✨💜
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }
  </script>
</body>
</html>
