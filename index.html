<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Intelligence System</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #050b1a;
      color: #a8d8ff;
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 80px;
    }

    .container {
      text-align: center;
      position: relative;
      transform: scale(1.65); /* EVERYTHING BIGGER */
    }

    .title {
      font-family: "Lucida Calligraphy", "Brush Script MT", cursive;
      font-size: 4.8rem;
      margin-bottom: 60px;
      text-shadow: 0 0 15px #4fc3f7;
    }

    /* ROBOT */
    .robot {
      width: 260px;
      height: 340px;
      background: #e0f7fa;
      border-radius: 40px;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 0 20px rgba(79,195,247,0.6);
      animation: float 3s ease-in-out infinite;
      margin-top: 120px; /* LOWER ROBOT */
    }

    .robot::before {
      content: "";
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      height: 150px;
      background: #b2ebf2;
      border-radius: 35px;
      box-shadow: 0 0 15px rgba(79,195,247,0.6);
    }

    .eye {
      position: absolute;
      top: -55px;
      width: 32px;
      height: 32px;
      background: #004d40;
      border-radius: 50%;
      box-shadow: 0 0 10px #00e5ff;
    }
    .eye.left { left: 55px; }
    .eye.right { right: 55px; }

    .smile {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 40px;
      border-bottom: 7px solid #004d40;
      border-radius: 0 0 50px 50px;
    }

    .screwdriver {
      position: absolute;
      bottom: 30px;
      right: -70px;
      width: 30px;
      height: 130px;
      background: #ffab40;
      border-radius: 12px;
      transform-origin: top;
      animation: fix 1.5s ease-in-out infinite;
    }

    .screwdriver::after {
      content: "";
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 30px;
      background: #b0bec5;
      border-radius: 5px;
    }

    .gear {
      font-size: 4rem;
      color: #a8d8ff;
      position: absolute;
      animation: spin 4s linear infinite;
    }
    .gear.one { bottom: -30px; left: -110px; }
    .gear.two { bottom: 60px; left: -170px; animation-duration: 6s; }
    .gear.three { bottom: 150px; left: -110px; animation-duration: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes fix {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-30deg); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* BUBBLE — CENTERED + 💭 INSIDE */
    .bubble {
      position: absolute;
      top: 20px;
      right: -350px; /* MORE RIGHT */
      width: 350px;
      background: #050b1a;
      border-radius: 30px;
      border: 2px solid #a8d8ff;
      padding: 30px;
      color: #ffffff;
      font-size: 1.4rem;
      text-align: center; /* CENTER TEXT */
      box-shadow: 0 0 15px rgba(168,216,255,0.5);
    }

    .bubble::before {
      content: "💭";
      position: absolute;
      top: -55px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3.5rem;
    }

    /* MENU BUTTON — MORE RIGHT */
    .menu-button {
      position: fixed;
      top: 20px;
      right: 80px; /* MORE RIGHT */
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 3px solid #a8d8ff;
      color: #a8d8ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      font-size: 1.6rem;
      cursor: pointer;
      background: rgba(5,11,26,0.8);
      box-shadow: 0 0 20px rgba(168,216,255,0.6);
    }

    .menu-panel {
      position: fixed;
      top: 220px;
      right: 80px; /* MATCH BUTTON */
      background: #050b1a;
      border: 2px solid #a8d8ff;
      border-radius: 15px;
      padding: 20px 25px;
      display: none;
      box-shadow: 0 0 20px rgba(168,216,255,0.6);
    }

    .menu-link {
      display: block;
      margin: 15px 0;
      color: #a8d8ff;
      text-decoration: none;
      font-size: 1.4rem;
    }

    .menu-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="menu-button" onclick="toggleMenu()">Menu</div>

  <div class="menu-panel" id="menu">
    <a class="menu-link" href="knowledge.html">📖 Knowledge Studio</a>
    <a class="menu-link" href="luna.html">🤖 Luna AI Assistant</a>
    <a class="menu-link" href="mind.html">🗺️ Mind Atlas</a>
    <a class="menu-link" href="life.html">💚 Life Console</a>
    <a class="menu-link" href="community.html">👫🏻 Community Insights</a>
  </div>

  <div class="container">
    <div class="title">Personal Intelligence System</div>

    <div class="scene">
      <div class="robot">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>

        <div class="screwdriver"></div>

        <div class="gear one">⚙️</div>
        <div class="gear two">⚙️</div>
        <div class="gear three">⚙️</div>
      </div>

      <div class="bubble">
        Hello!! My name is Luna!!<br>
        Let’s chat, work or study together!! ✨💜
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }
  </script>

</body>
</html>
