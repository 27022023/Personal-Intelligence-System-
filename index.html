<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personal Intelligence System</title>

<style>

    body {
        margin: 0;
        background: #061226; /* deeper navy */
        font-family: "Segoe UI", sans-serif;
        overflow-x: hidden;
    }

    /* Title */
    .title {
        text-align: center;
        margin-top: 70px;
        font-size: 110px;
        font-family: "Lucida Calligraphy", "Brush Script MT", cursive;
        color: #7dd6ff;
        text-shadow: 0 0 30px #7dd6ff;
    }

    /* Robot area */
    .robot-area {
        margin-top: 120px; /* moved further down */
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Robot body */
    .robot {
        width: 240px;
        height: 320px;
        background: #cce7ff;
        border-radius: 35px;
        position: relative;
        box-shadow: 0 0 20px #7dd6ff;
    }

    /* Robot head */
    .robot-head {
        width: 200px;
        height: 150px;
        background: #e0f7ff;
        border-radius: 35px;
        position: absolute;
        top: -140px;
        left: 20px;
        box-shadow: 0 0 20px #7dd6ff;
    }

    /* Eyes */
    .eye {
        width: 40px;
        height: 40px;
        background: #7dd6ff;
        border-radius: 50%;
        position: absolute;
        top: 45px;
        animation: blink 3s infinite;
    }

    .eye.left { left: 30px; }
    .eye.right { right: 30px; }

    @keyframes blink {
        0%, 90%, 100% { height: 40px; }
        95% { height: 5px; }
    }

    /* Screwdriver hand */
    .hand {
        width: 28px;
        height: 120px;
        background: #b0d9ff;
        position: absolute;
        right: -40px;
        top: 90px;
        border-radius: 15px;
        transform-origin: top;
        animation: fix 1.5s infinite alternate;
    }

    @keyframes fix {
        from { transform: rotate(20deg); }
        to { transform: rotate(-30deg); }
    }

    /* Gears */
    .gears {
        margin-top: 60px;
        font-size: 100px;
        color: #7dd6ff;
        animation: spin 3s linear infinite;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* Speech bubble */
    .bubble {
        margin-top: 60px;
        background: #061226;
        border: 4px solid #7dd6ff;
        color: white;
        padding: 40px;
        width: 550px;
        border-radius: 35px;
        font-size: 32px;
        text-align: center;
        box-shadow: 0 0 20px #7dd6ff;
    }

    /* Menu button */
    .menu-btn {
        position: fixed;
        top: 30px;
        right: 30px;
        background: #7dd6ff;
        color: #061226;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 32px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 25px #7dd6ff;
        transition: 0.3s;
        z-index: 1000;
    }

    .menu-btn:hover {
        transform: scale(1.12);
    }

    /* Menu panel */
    .menu-panel {
        position: fixed;
        top: 0;
        right: -400px;
        width: 400px;
        height: 100%;
        background: #11264d;
        box-shadow: -5px 0 20px #000;
        padding: 60px 40px;
        transition: 0.4s;
        color: white;
        font-size: 30px;
        z-index: 999;
    }

    .menu-panel a {
        display: block;
        margin: 40px 0;
        color: #7dd6ff;
        text-decoration: none;
        font-size: 32px;
    }

</style>
</head>

<body>

<div class="title">Personal Intelligence System</div>

<div class="robot-area">

    <div class="robot">
        <div class="robot-head">
            <div class="eye left"></div>
            <div class="eye right"></div>
        </div>
        <div class="hand"></div>
    </div>

    <div class="gears">⚙️⚙️⚙️</div>

    <div class="bubble">
        Hello!! My name is Luna!!<br>
        Let's chat, work or study together!! ✨💜
    </div>

</div>

<div class="menu-btn" onclick="toggleMenu()">Menu</div>

<div class="menu-panel" id="menuPanel">
    <a href="knowledge.html">Knowledge Studio 📖</a>
    <a href="luna.html">Luna AI Assistant 🤖</a>
    <a href="mind.html">Mind Atlas 🗺️</a>
    <a href="life.html">Life Console 💚</a>
    <a href="community.html">Community Insights 👫🏻</a>
</div>

<script>
let menuOpen = false;

function toggleMenu() {
    const panel = document.getElementById("menuPanel");

    if (!menuOpen) {
        panel.style.right = "0";
        menuOpen = true;
    } else {
        panel.style.right = "-400px";
        menuOpen = false;
    }
}
</script>

</body>
</html>
