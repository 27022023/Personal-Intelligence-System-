<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personal Intelligence System</title>
<style>

    body {
        margin: 0;
        background: #0a1a33; /* rich navy */
        font-family: "Segoe UI", sans-serif;
        overflow-x: hidden;
    }

    /* Title */
    .title {
        text-align: center;
        margin-top: 60px;
        font-size: 60px;
        font-family: "Lucida Calligraphy", "Brush Script MT", cursive;
        color: #7dd6ff;
        text-shadow: 0 0 15px #7dd6ff;
    }

    /* Robot container */
    .robot-area {
        margin-top: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Robot body */
    .robot {
        width: 120px;
        height: 160px;
        background: #cce7ff;
        border-radius: 20px;
        position: relative;
        box-shadow: 0 0 10px #7dd6ff;
    }

    /* Robot head */
    .robot-head {
        width: 100px;
        height: 80px;
        background: #e0f7ff;
        border-radius: 20px;
        position: absolute;
        top: -70px;
        left: 10px;
        box-shadow: 0 0 10px #7dd6ff;
    }

    /* Robot eyes */
    .eye {
        width: 20px;
        height: 20px;
        background: #7dd6ff;
        border-radius: 50%;
        position: absolute;
        top: 25px;
        animation: blink 3s infinite;
    }

    .eye.left { left: 20px; }
    .eye.right { right: 20px; }

    @keyframes blink {
        0%, 90%, 100% { height: 20px; }
        95% { height: 2px; }
    }

    /* Screwdriver hand */
    .hand {
        width: 15px;
        height: 60px;
        background: #b0d9ff;
        position: absolute;
        right: -20px;
        top: 40px;
        border-radius: 10px;
        transform-origin: top;
        animation: fix 1.5s infinite alternate;
    }

    @keyframes fix {
        from { transform: rotate(10deg); }
        to { transform: rotate(-20deg); }
    }

    /* Gears */
    .gears {
        margin-top: 20px;
        font-size: 40px;
        color: #7dd6ff;
        animation: spin 3s linear infinite;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* Speech bubble */
    .bubble {
        margin-top: 30px;
        background: #0a1a33;
        border: 2px solid #7dd6ff;
        color: white;
        padding: 20px;
        width: 300px;
        border-radius: 20px;
        font-size: 18px;
        text-align: center;
        box-shadow: 0 0 10px #7dd6ff;
    }

    /* Menu button */
    .menu-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #7dd6ff;
        color: #0a1a33;
        width: 90px;
        height: 90px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 15px #7dd6ff;
        transition: 0.3s;
    }

    .menu-btn:hover {
        transform: scale(1.1);
    }

    /* Menu panel */
    .menu-panel {
        position: fixed;
        top: 0;
        right: -300px;
        width: 300px;
        height: 100%;
        background: #11264d;
        box-shadow: -5px 0 10px #000;
        padding: 40px 20px;
        transition: 0.4s;
        color: white;
        font-size: 20px;
    }

    .menu-panel a {
        display: block;
        margin: 20px 0;
        color: #7dd6ff;
        text-decoration: none;
        font-size: 22px;
    }

</style>
</head>

<body>

<div class="title">Personal Intelligence System</div>

<div class="robot-area">

    <div class="robot">
        <div class="robot-head">
            <div class="eye left"></div>
            <div class="eye right"></div>
        </div>
        <div class="hand"></div>
    </div>

    <div class="gears">⚙️⚙️⚙️</div>

    <div class="bubble">
        Hello!! My name is Luna!!<br>
        Let's chat, work or study together!! ✨💜
    </div>

</div>

<div class="menu-btn" onclick="openMenu()">Menu</div>

<div class="menu-panel" id="menuPanel">
    <a href="knowledge.html">Knowledge Studio 📖</a>
    <a href="luna.html">Luna AI Assistant 🤖</a>
    <a href="mind.html">Mind Atlas 🗺️</a>
    <a href="life.html">Life Console 💚</a>
    <a href="community.html">Community Insights 👫🏻</a>
</div>

<script>
function openMenu() {
    document.getElementById("menuPanel").style.right = "0";
}
</script>

</body>
</html>
