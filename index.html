<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal Intelligence System</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #050b1a; /* rich navy */
      color: #a8d8ff;      /* glowing blue */
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      position: relative;
      transform: scale(1.6); /* EVERYTHING BIGGER */
    }

    .title {
      font-family: "Lucida Calligraphy", "Brush Script MT", cursive;
      font-size: 4rem;
      color: #a8d8ff;
      text-shadow: 0 0 15px #4fc3f7;
      margin-bottom: 40px;
    }

    /* ROBOT */
    .robot {
      width: 240px;
      height: 300px;
      background: #e0f7fa;
      border-radius: 40px;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 0 20px rgba(79,195,247,0.6);
      animation: float 3s ease-in-out infinite;
    }

    /* ROBOT HEAD */
    .robot::before {
      content: "";
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 120px;
      background: #b2ebf2;
      border-radius: 30px;
      box-shadow: 0 0 15px rgba(79,195,247,0.6);
    }

    /* EYES */
    .eye {
      position: absolute;
      top: -40px;
      width: 25px;
      height: 25px;
      background: #004d40;
      border-radius: 50%;
      box-shadow: 0 0 10px #00e5ff;
    }
    .eye.left { left: 45px; }
    .eye.right { right: 45px; }

    /* SMILE */
    .smile {
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 30px;
      border-bottom: 6px solid #004d40;
      border-radius: 0 0 50px 50px;
    }

    /* REAL SCREWDRIVER */
    .screwdriver {
      position: absolute;
      bottom: 20px;
      right: -60px;
      width: 25px;
      height: 110px;
      background: #ffab40;
      border-radius: 12px;
      transform-origin: top;
      animation: fix 1.5s ease-in-out infinite;
    }
    .screwdriver::after {
      content: "";
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 25px;
      background: #b0bec5;
      border-radius: 5px;
    }

    /* GEARS */
    .gear {
      font-size: 3.2rem;
      color: #a8d8ff;
      position: absolute;
      animation: spin 4s linear infinite;
    }
    .gear.one { bottom: -20px; left: -80px; }
    .gear.two { bottom: 40px; left: -140px; animation-duration: 6s; }
    .gear.three { bottom: 110px; left: -80px; animation-duration: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes fix {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-30deg); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* SPEECH BUBBLE */
    .bubble {
      position: absolute;
      top: -40px;
      right: -350px;
      width: 320px;
      background: #050b1a;
      border-radius: 20px;
      border: 2px solid #a8d8ff;
      padding: 20px;
      color: #ffffff;
      font-size: 1.2rem;
      box-shadow: 0 0 15px rgba(168,216,255,0.5);
    }

    .bubble::after {
      content: "";
      position: absolute;
      left: -20px;
      top: 60px;
      border-width: 20px;
      border-style: solid;
      border-color: transparent #050b1a transparent transparent;
    }

    /* MENU BUTTON */
    .menu-button {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 3px solid #a8d8ff;
      color: #a8d8ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      font-size: 1.3rem;
      cursor: pointer;
      background: rgba(5,11,26,0.8);
      box-shadow: 0 0 20px rgba(168,216,255,0.6);
    }

    .menu-panel {
      position: fixed;
      top: 180px;
      right: 20px;
      background: #050b1a;
      border: 2px solid #a8d8ff;
      border-radius: 15px;
      padding: 15px 20px;
      display: none;
      box-shadow: 0 0 20px rgba(168,216,255,0.6);
    }

    .menu-link {
      display: block;
      margin: 10px 0;
      color: #a8d8ff;
      text-decoration: none;
      font-size: 1.2rem;
    }

    .menu-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="menu-button" onclick="toggleMenu()">Menu</div>

  <div class="menu-panel" id="menu">
    <a class="menu-link" href="knowledge.html">📖 Knowledge Studio</a>
    <a class="menu-link" href="luna.html">🤖 Luna AI Assistant</a>
    <a class="menu-link" href="mind.html">🗺️ Mind Atlas</a>
    <a class="menu-link" href="life.html">💚 Life Console</a>
    <a class="menu-link" href="community.html">👫🏻 Community Insights</a>
  </div>

  <div class="container">
    <div class="title">Personal Intelligence System</div>

    <div class="scene">
      <div class="robot">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>

        <div class="screwdriver"></div>

        <div class="gear one">⚙️</div>
        <div class="gear two">⚙️</div>
        <div class="gear three">⚙️</div>
      </div>

      <div class="bubble">
        Hello!! My name is Luna!!<br>
        Let’s chat, work or study together!! ✨💜
      </div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('menu');
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }
  </script>

</body>
</html>
